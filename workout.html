<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#E07800">
    <title>💪 FITNESS - Seu Treino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
</head>
<body class="bg-gray-50">

<!-- HEADER -->
<div class="bg-gradient-to-r from-orange-600 to-orange-500 text-white shadow-lg sticky top-0 z-40">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
        <button onclick="goBack()" class="text-2xl hover:scale-110 transition">←</button>
        <h1 id="workoutTitle" class="text-xl font-black">Carregando...</h1>
        <div class="flex gap-4 text-sm font-bold">
            <span id="exerciseCounter">0/0</span>
            <span id="pointsCounter">⭐ 0</span>
        </div>
    </div>
    <div class="bg-black/20 h-2 max-w-4xl mx-auto">
        <div id="progressBar" class="h-full bg-white transition-all duration-300" style="width: 0%"></div>
    </div>
</div>

<!-- MAIN -->
<div class="max-w-4xl mx-auto px-4 py-8">
    <div id="exercisesContainer" class="space-y-6"></div>
    
    <div id="emptyState" class="text-center py-16">
        <div class="text-6xl mb-4 animate-spin">⚙️</div>
        <p class="text-gray-600 text-lg">Carregando seu treino...</p>
    </div>
</div>

<!-- COMPLETION MODAL -->
<div id="completionModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 text-center animate-bounce">
        <div class="text-7xl mb-4 animate-bounce" style="animation-delay: 0.2s;">🎉</div>
        <h2 class="text-3xl font-black text-gray-900 mb-2">Parabéns!</h2>
        <p class="text-gray-600 mb-6">Você completou o treino!</p>
        
        <div class="bg-gradient-to-r from-orange-100 to-yellow-100 border-2 border-orange-400 rounded-lg p-6 mb-6">
            <div class="text-4xl font-black text-orange-600" id="totalPoints">+500</div>
            <div class="text-sm text-gray-600 font-bold mt-2">PONTOS GANHOS</div>
            <div class="text-xs text-gray-500 mt-1" id="bonusText"></div>
        </div>

        <div class="flex flex-col gap-3">
            <button onclick="continueToApp()" class="bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-lg font-bold transition">
                Voltar ao App
            </button>
            <button onclick="repeatWorkout()" class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-3 rounded-lg font-bold transition">
                Repetir Treino
            </button>
        </div>
    </div>
</div>

<!-- CONFETTI -->
<canvas id="confetti" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 40;"></canvas>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBK7hpCtjQ6COYOFZw1k2l84tBbjfHqUdI",
        authDomain: "fitness-app-7aa96.firebaseapp.com",
        projectId: "fitness-app-7aa96",
        storageBucket: "fitness-app-7aa96.firebasestorage.app",
        messagingSenderId: "123102660519",
        appId: "1:123102660519:web:b71e04b17fea141e629882"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let workout = null;
    let currentExerciseIndex = 0;
    let completedExercises = [];
    let totalPoints = 0;
    let userData = null;

    const motivations = [
        '💪 Você é forte!', '🔥 Que força!', '⚡ Perfeito!', '🎯 Top!',
        '🏆 Campeão!', '✨ Brilhante!', '🚀 Vamo!', '👑 Lendário!'
    ];

    auth.onAuthStateChanged(async user => {
        if (!user) {
            console.log('❌ No user, redirecting');
            window.location.href = 'index.html';
            return;
        }
        currentUser = user;
        await initWorkout();
    });

    async function initWorkout() {
        try {
            console.log('🚀 Initializing workout...');

            // Get user data
            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            if (!userDoc.exists) {
                showError('Perfil não encontrado');
                return;
            }
            userData = userDoc.data();

            // Get treino
            const params = new URLSearchParams(window.location.search);
            const treinoId = params.get('treinoId');

            if (!treinoId) {
                showError('Nenhum treino selecionado');
                return;
            }

            const treinoDoc = await db.collection('treinos').doc(treinoId).get();
            if (!treinoDoc.exists) {
                showError('Treino não encontrado');
                return;
            }

            workout = { id: treinoDoc.id, ...treinoDoc.data() };
            console.log('✅ Workout loaded:', workout.name);

            renderWorkout();
            document.getElementById('emptyState').classList.add('hidden');

        } catch (error) {
            console.error('❌ Init error:', error);
            showError('Erro ao carregar treino');
        }
    }

    function renderWorkout() {
        document.getElementById('workoutTitle').textContent = workout.name;

        if (!workout.exercises || workout.exercises.length === 0) {
            showError('Este treino não tem exercícios');
            return;
        }

        const container = document.getElementById('exercisesContainer');
        container.innerHTML = '';

        workout.exercises.forEach((exercise, index) => {
            const isCompleted = completedExercises.includes(index);
            const isCurrent = index === currentExerciseIndex;

            const card = document.createElement('div');
            card.className = `bg-white rounded-lg shadow-lg p-6 border-l-4 transition ${
                isCompleted ? 'border-green-600 bg-green-50' : 
                isCurrent ? 'border-orange-600' : 'border-gray-300'
            }`;

            let content = `
                <div class="flex items-start gap-4 mb-4">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center font-black text-white ${
                        isCompleted ? 'bg-green-600' : 'bg-orange-600'
                    }">
                        ${index + 1}
                    </div>
                    <div class="flex-1">
                        <h3 class="text-2xl font-black text-gray-900">${exercise.name}</h3>
                        <span class="text-xs font-bold ${
                            isCompleted ? 'text-green-600 bg-green-100' : 'text-orange-600 bg-orange-100'
                        } px-3 py-1 rounded-full">
                            ${isCompleted ? '✅ Completo' : 'Em progresso'}
                        </span>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    ${exercise.sets ? `
                        <div class="bg-gray-100 rounded-lg p-3 text-center">
                            <div class="text-2xl font-black text-orange-600">${exercise.sets}</div>
                            <div class="text-xs text-gray-600 font-bold mt-1">SÉRIES</div>
                        </div>
                    ` : ''}
                    ${exercise.reps ? `
                        <div class="bg-gray-100 rounded-lg p-3 text-center">
                            <div class="text-2xl font-black text-orange-600">${exercise.reps}</div>
                            <div class="text-xs text-gray-600 font-bold mt-1">REPS</div>
                        </div>
                    ` : ''}
                    ${exercise.weight ? `
                        <div class="bg-gray-100 rounded-lg p-3 text-center">
                            <div class="text-2xl font-black text-orange-600">${exercise.weight}</div>
                            <div class="text-xs text-gray-600 font-bold mt-1">KG</div>
                        </div>
                    ` : ''}
                    ${exercise.rest ? `
                        <div class="bg-gray-100 rounded-lg p-3 text-center">
                            <div class="text-2xl font-black text-orange-600">${exercise.rest}</div>
                            <div class="text-xs text-gray-600 font-bold mt-1">SEG DESCANSO</div>
                        </div>
                    ` : ''}
                </div>
            `;

            if (isCurrent && !isCompleted) {
                content += `
                    <div class="bg-orange-50 border-2 border-orange-300 rounded-lg p-4 mb-4">
                        <div class="text-sm font-bold text-gray-900 mb-3">Reps Realizadas:</div>
                        <input type="number" id="repsInput-${index}" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-orange-500 focus:outline-none mb-4" min="0" value="${exercise.reps || 0}">
                        <div class="flex gap-2">
                            <button onclick="completeExercise(${index})" class="flex-1 bg-orange-600 hover:bg-orange-700 text-white px-4 py-3 rounded-lg font-bold transition">
                                ✅ Completo
                            </button>
                            <button onclick="skipExercise(${index})" class="flex-1 bg-gray-400 hover:bg-gray-500 text-white px-4 py-3 rounded-lg font-bold transition">
                                ⏭️ Pular
                            </button>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        ${index > 0 ? `
                            <button onclick="previousExercise()" class="flex-1 bg-gray-400 hover:bg-gray-500 text-white px-4 py-3 rounded-lg font-bold transition">
                                ← Anterior
                            </button>
                        ` : ''}
                        <button onclick="completeExercise(${index})" class="flex-1 bg-green-600 hover:bg-green-700 text-white px-4 py-3 rounded-lg font-bold transition">
                            ✅ Concluir
                        </button>
                    </div>
                `;
            }

            card.innerHTML = content;
            container.appendChild(card);
        });

        updateProgress();
    }

    function completeExercise(index) {
        if (completedExercises.includes(index)) {
            showToast('✅ Já foi completado!');
            return;
        }

        completedExercises.push(index);
        const exercise = workout.exercises[index];
        const points = 100 + (exercise.sets || 3) * 10 + (exercise.reps || 10) * 2;
        totalPoints += points;

        showMotivation(points);
        createConfetti();

        if (index === workout.exercises.length - 1) {
            setTimeout(() => completeWorkout(), 2000);
        } else {
            currentExerciseIndex = index + 1;
            renderWorkout();
        }
    }

    function skipExercise(index) {
        if (completedExercises.includes(index)) return;
        completedExercises.push(index);

        if (index === workout.exercises.length - 1) {
            completeWorkout();
        } else {
            currentExerciseIndex = index + 1;
            renderWorkout();
        }
    }

    function previousExercise() {
        if (currentExerciseIndex > 0) {
            currentExerciseIndex--;
            renderWorkout();
        }
    }

    function updateProgress() {
        const total = workout.exercises.length;
        const completed = completedExercises.length;
        const percentage = (completed / total) * 100;

        document.getElementById('progressBar').style.width = percentage + '%';
        document.getElementById('exerciseCounter').textContent = `${completed}/${total}`;
        document.getElementById('pointsCounter').textContent = `⭐ ${totalPoints}`;
    }

    async function completeWorkout() {
        try {
            console.log('🏆 Completing workout...');

            const basePoints = totalPoints;
            const completionBonus = completedExercises.length === workout.exercises.length ? 200 : 0;
            const finalPoints = basePoints + completionBonus;

            // Save to Firestore
            await db.collection('workouts_completed').add({
                alunoId: currentUser.uid,
                treinoId: workout.id,
                treinoName: workout.name,
                exercises_done: completedExercises.length,
                totalExercises: workout.exercises.length,
                points: finalPoints,
                completed_at: new Date()
            });

            // Update user gamification
            const newPoints = (userData.gamification?.totalPoints || 0) + finalPoints;
            const newWorkouts = (userData.gamification?.totalWorkouts || 0) + 1;
            const newStreak = (userData.gamification?.streak || 0) + 1;

            await db.collection('users').doc(currentUser.uid).update({
                'gamification.totalPoints': newPoints,
                'gamification.totalWorkouts': newWorkouts,
                'gamification.streak': newStreak,
                'gamification.level': calculateLevel(newPoints),
                updatedAt: new Date()
            });

            console.log('✅ Workout completed!');
            showCompletionModal(finalPoints, completionBonus);

        } catch (error) {
            console.error('❌ Error completing workout:', error);
            showToast('❌ Erro ao salvar treino');
        }
    }

    function calculateLevel(points) {
        if (points >= 3000) return 'Supremo';
        if (points >= 1500) return 'Lendário';
        if (points >= 500) return 'Guerreiro';
        return 'Novato';
    }

    function showCompletionModal(finalPoints, bonus) {
        let bonusText = '';
        if (bonus > 0) {
            bonusText = `<br><span class="text-green-600 font-bold">+ ${bonus} pontos de bônus!</span>`;
        }
        if (completedExercises.length < workout.exercises.length) {
            bonusText += `<br><span class="text-yellow-600 font-bold">Complete todos para ganhar bônus!</span>`;
        }

        document.getElementById('totalPoints').textContent = `+${finalPoints}`;
        document.getElementById('bonusText').innerHTML = bonusText;
        document.getElementById('completionModal').classList.remove('hidden');
    }

    function showMotivation(points) {
        const msg = motivations[Math.floor(Math.random() * motivations.length)];
        showToast(`${msg} +${points} pts!`);
    }

    function createConfetti() {
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const colors = ['#E07800', '#FF9900', '#FFD700', '#4caf50'];

        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: -10,
                size: Math.random() * 8 + 4,
                color: colors[Math.floor(Math.random() * colors.length)],
                vx: (Math.random() - 0.5) * 8,
                vy: Math.random() * 5 + 5,
                rotation: Math.random() * Math.PI * 2,
                vr: Math.random() * 0.2 - 0.1
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.rotation += p.vr;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                ctx.restore();

                if (p.y > canvas.height) {
                    particles.splice(i, 1);
                }
            });

            if (particles.length > 0) {
                requestAnimationFrame(animate);
            }
        }

        animate();
    }

    function continueToApp() {
        window.location.href = 'app.html';
    }

    function repeatWorkout() {
        completedExercises = [];
        currentExerciseIndex = 0;
        totalPoints = 0;
        document.getElementById('completionModal').classList.add('hidden');
        renderWorkout();
    }

    function goBack() {
        if (confirm('Tem certeza? Seu progresso será perdido.')) {
            window.location.href = 'app.html';
        }
    }

    function showError(msg) {
        document.getElementById('emptyState').innerHTML = `
            <div class="text-center py-16">
                <div class="text-6xl mb-4">❌</div>
                <p class="text-gray-600 text-lg mb-4">${msg}</p>
                <button onclick="window.location.href='app.html'" class="bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-lg font-bold">
                    Voltar
                </button>
            </div>
        `;
        document.getElementById('emptyState').classList.remove('hidden');
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg z-50 animate-bounce';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
</script>

</body>
</html>
