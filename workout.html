<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#E07800">
    <title>💪 FITNESS - Executa Treino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f5;
        }

        .workout-header {
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .header-back {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .header-back:hover {
            background: rgba(255,255,255,0.3);
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
        }

        .header-stats {
            display: flex;
            gap: 16px;
            justify-content: space-between;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .progress-section {
            margin-top: 12px;
        }

        .progress-text {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 6px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: white;
            transition: width 0.3s;
        }

        .workout-main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .exercises-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .exercise-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }

        .exercise-card.completed {
            opacity: 0.5;
        }

        .exercise-card.active {
            border: 3px solid #E07800;
            box-shadow: 0 8px 24px rgba(224, 120, 0, 0.2);
        }

        .exercise-header {
            background: #f8f8f8;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .exercise-info h3 {
            margin: 0 0 4px 0;
            font-size: 16px;
            color: #333;
        }

        .exercise-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #999;
        }

        .exercise-status {
            font-size: 20px;
        }

        .exercise-body {
            padding: 20px;
            display: none;
        }

        .exercise-body.show {
            display: block;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .control-item {
            text-align: center;
        }

        .control-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .control-value {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #f8f8f8;
            border-radius: 8px;
            padding: 12px;
        }

        .btn-control {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #E07800;
            color: white;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .btn-control:hover {
            background: #FF9900;
            transform: scale(1.1);
        }

        .control-display {
            font-size: 24px;
            font-weight: 700;
            color: #E07800;
            min-width: 50px;
        }

        .rest-timer {
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .rest-timer.active {
            display: block;
            animation: pulse 0.6s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .timer-display {
            font-size: 48px;
            font-weight: 700;
            margin: 12px 0;
            font-family: 'Monaco', monospace;
        }

        .timer-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-timer {
            padding: 8px 12px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }

        .btn-timer:hover {
            background: white;
            color: #E07800;
        }

        .photo-section {
            margin-bottom: 20px;
        }

        .photo-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .photo-upload {
            border: 2px dashed #E07800;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .photo-upload:hover {
            background: #fffaf0;
            border-color: #FF9900;
        }

        .photo-upload input {
            display: none;
        }

        .photo-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .exercise-actions {
            display: flex;
            gap: 12px;
        }

        .btn-primary {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224, 120, 0, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
        }

        .btn-secondary {
            flex: 1;
            padding: 14px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: #E07800;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .modal-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }

        .modal-subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .modal-stats {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .modal-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #E07800;
        }

        .modal-stat-label {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .modal-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }

        .modal-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224, 120, 0, 0.3);
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #E07800;
            pointer-events: none;
            z-index: 1999;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            z-index: 2000;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            .header-stats {
                font-size: 11px;
                gap: 12px;
            }

            .stat-value {
                font-size: 14px;
            }

            .controls-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .timer-display {
                font-size: 36px;
            }

            .modal-content {
                padding: 30px;
            }

            .modal-icon {
                font-size: 60px;
            }

            .modal-title {
                font-size: 24px;
            }

            .exercise-actions {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .workout-main {
                padding: 12px;
            }

            .header-title {
                font-size: 16px;
            }

            .controls-grid {
                grid-template-columns: 1fr;
            }

            .modal-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header class="workout-header">
    <div class="header-top">
        <button class="header-back" onclick="goBack()">← Voltar</button>
        <h1 class="header-title" id="workoutTitle">Treino</h1>
        <div style="width: 80px;"></div>
    </div>

    <div class="progress-section">
        <div class="progress-text" id="progressText">0 de 0</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
    </div>

    <div class="header-stats">
        <div class="stat-item">
            <span class="stat-value" id="completedExercises">0</span>
            <span>Completos</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="totalTime">00:00</span>
            <span>Tempo</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="totalPoints">0</span>
            <span>Pontos</span>
        </div>
    </div>
</header>

<main class="workout-main">
    <div id="loading" class="loading">Carregando treino...</div>
    <div class="exercises-list" id="exercisesList" style="display: none;"></div>
</main>

<!-- COMPLETION MODAL -->
<div id="completionModal" class="modal">
    <div class="modal-content">
        <div class="modal-icon">🎉</div>
        <h2 class="modal-title">Parabéns!</h2>
        <p class="modal-subtitle" id="modalSubtitle">Você completou o treino!</p>

        <div class="modal-stats">
            <div>
                <div class="modal-stat-value" id="finalExercises">0</div>
                <div class="modal-stat-label">Exercícios</div>
            </div>
            <div>
                <div class="modal-stat-value" id="finalTime">00:00</div>
                <div class="modal-stat-label">Tempo</div>
            </div>
            <div>
                <div class="modal-stat-value" id="finalPoints">0</div>
                <div class="modal-stat-label">Pontos</div>
            </div>
        </div>

        <button class="modal-button" onclick="finishWorkout()">🏠 Voltar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBK7hpCtjQ6COYOFZw1k2l84tBbjfHqUdI",
        authDomain: "fitness-app-7aa96.firebaseapp.com",
        projectId: "fitness-app-7aa96",
        storageBucket: "fitness-app-7aa96.firebasestorage.app",
        messagingSenderId: "123102660519",
        appId: "1:123102660519:web:b71e04b17fea141e629882"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let workoutData = null;
    let workoutStartTime = Date.now();
    let timerInterval = null;
    let exerciseData = {};
    let restTimers = {};

    const urlParams = new URLSearchParams(window.location.search);
    const workoutId = urlParams.get('id');
    const alunoId = urlParams.get('alunoId');

    auth.onAuthStateChanged(user => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        currentUser = user;
        initializeWorkout();
    });

    async function initializeWorkout() {
        try {
            if (!workoutId) {
                // Criar treino demo para testes
                const exercises = [
                    { name: 'Supino', sets: 4, reps: 8, weight: 100, rest: 60 },
                    { name: 'Rosca Direta', sets: 3, reps: 10, weight: 30, rest: 45 },
                    { name: 'Agachamento', sets: 4, reps: 10, weight: 80, rest: 60 }
                ];

                workoutData = {
                    name: 'Treino Demo',
                    exercises,
                    id: 'demo'
                };
            } else {
                const doc = await db.collection('treinos').doc(workoutId).get();
                if (!doc.exists) {
                    showToast('❌ Treino não encontrado');
                    setTimeout(() => goBack(), 2000);
                    return;
                }
                workoutData = { id: doc.id, ...doc.data() };
            }

            document.getElementById('workoutTitle').textContent = workoutData.name;
            document.getElementById('loading').style.display = 'none';

            renderExercises();
            startTimer();
            showToast('💪 Vamo conquistar esse treino!');

        } catch (error) {
            console.error('Erro:', error);
            showToast('❌ Erro ao carregar');
        }
    }

    function renderExercises() {
        const container = document.getElementById('exercisesList');
        container.style.display = 'block';

        const total = workoutData.exercises?.length || 0;
        document.getElementById('progressText').textContent = `0 de ${total}`;

        container.innerHTML = (workoutData.exercises || []).map((exercise, index) => `
            <div class="exercise-card" id="exercise-${index}" data-index="${index}">
                <div class="exercise-header" onclick="toggleExercise(${index})">
                    <div class="exercise-info">
                        <h3>${exercise.name}</h3>
                        <div class="exercise-meta">
                            <span>${exercise.sets || 0}x${exercise.reps || 0}</span>
                            <span>${exercise.weight || 0}kg</span>
                            <span>${exercise.rest || 0}s</span>
                        </div>
                    </div>
                    <div class="exercise-status" id="status-${index}">⭕</div>
                </div>

                <div class="exercise-body" id="body-${index}">
                    <div class="controls-grid">
                        <div class="control-item">
                            <span class="control-label">Séries</span>
                            <div class="control-value">
                                <button class="btn-control" onclick="changeSets(${index}, -1)">−</button>
                                <span class="control-display" id="sets-${index}">${exercise.sets || 0}</span>
                                <button class="btn-control" onclick="changeSets(${index}, 1)">+</button>
                            </div>
                        </div>
                        <div class="control-item">
                            <span class="control-label">Reps</span>
                            <div class="control-value">
                                <button class="btn-control" onclick="changeReps(${index}, -1)">−</button>
                                <span class="control-display" id="reps-${index}">${exercise.reps || 0}</span>
                                <button class="btn-control" onclick="changeReps(${index}, 1)">+</button>
                            </div>
                        </div>
                        <div class="control-item">
                            <span class="control-label">Peso (kg)</span>
                            <div class="control-value">
                                <button class="btn-control" onclick="changeWeight(${index}, -5)">−</button>
                                <span class="control-display" id="weight-${index}">${exercise.weight || 0}</span>
                                <button class="btn-control" onclick="changeWeight(${index}, 5)">+</button>
                            </div>
                        </div>
                    </div>

                    <div class="rest-timer" id="timer-${index}">
                        <div>Descanso</div>
                        <div class="timer-display" id="timer-display-${index}">00:00</div>
                        <div class="timer-buttons">
                            <button class="btn-timer" onclick="skipTimer(${index})">⏭️ Pular</button>
                        </div>
                    </div>

                    <div class="photo-section">
                        <label class="photo-label">📸 Foto do Exercício</label>
                        <div class="photo-upload" onclick="document.getElementById('photo-${index}').click()">
                            <div id="photo-preview-${index}"></div>
                            <p>📷 Clique para foto</p>
                            <input type="file" id="photo-${index}" accept="image/*" onchange="handlePhoto(${index}, event)" style="display:none;">
                        </div>
                    </div>

                    <div class="exercise-actions">
                        <button class="btn-primary" onclick="completeExercise(${index})">✅ Completo</button>
                        <button class="btn-secondary" onclick="skipExercise(${index})">⏭️ Pular</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function toggleExercise(index) {
        const body = document.getElementById(`body-${index}`);
        const card = document.getElementById(`exercise-${index}`);
        body.classList.toggle('show');
        card.classList.toggle('active');
    }

    function changeSets(index, delta) {
        const elem = document.getElementById(`sets-${index}`);
        let val = parseInt(elem.textContent) + delta;
        if (val < 0) val = 0;
        elem.textContent = val;
    }

    function changeReps(index, delta) {
        const elem = document.getElementById(`reps-${index}`);
        let val = parseInt(elem.textContent) + delta;
        if (val < 0) val = 0;
        elem.textContent = val;
    }

    function changeWeight(index, delta) {
        const elem = document.getElementById(`weight-${index}`);
        let val = parseInt(elem.textContent) + delta;
        if (val < 0) val = 0;
        elem.textContent = val;
    }

    function handlePhoto(index, e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = evt => {
            document.getElementById(`photo-preview-${index}`).innerHTML = 
                `<img src="${evt.target.result}" style="max-width: 100%; max-height: 200px; border-radius: 8px; margin-bottom: 12px;">`;
        };
        reader.readAsDataURL(file);
    }

    function completeExercise(index) {
        const card = document.getElementById(`exercise-${index}`);
        const status = document.getElementById(`status-${index}`);

        card.classList.add('completed');
        status.textContent = '✅';

        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

        const msgs = ['💪 Ótimo!', '🔥 Forte!', '⚡ Perfeito!', '🎯 Top!', '🏆 Campeão!'];
        showToast(msgs[Math.floor(Math.random() * msgs.length)]);

        const points = 100 + (parseInt(document.getElementById(`sets-${index}`).textContent) || 3) * 10;
        const current = parseInt(document.getElementById('totalPoints').textContent);
        document.getElementById('totalPoints').textContent = current + points;

        const completed = document.querySelectorAll('.exercise-card.completed').length;
        const total = document.querySelectorAll('.exercise-card').length;
        document.getElementById('completedExercises').textContent = completed;
        document.getElementById('progressText').textContent = `${completed} de ${total}`;
        document.getElementById('progressFill').style.width = (completed / total * 100) + '%';

        if (completed === total) {
            finishWorkoutSession();
        }
    }

    function skipExercise(index) {
        completeExercise(index);
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - workoutStartTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            document.getElementById('totalTime').textContent = 
                `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }, 1000);
    }

    function skipTimer(index) {
        const timer = document.getElementById(`timer-${index}`);
        clearInterval(restTimers[index]);
        timer.classList.remove('active');
    }

    function finishWorkoutSession() {
        clearInterval(timerInterval);

        createConfetti();
        playVictorySound();

        document.getElementById('finalExercises').textContent = 
            document.querySelectorAll('.exercise-card.completed').length;
        document.getElementById('finalTime').textContent = document.getElementById('totalTime').textContent;
        document.getElementById('finalPoints').textContent = document.getElementById('totalPoints').textContent;

        const msgs = ['Você é forte! 💪', 'Épico! 🔥', 'Campeão! 🏆', 'Extraordinário! ⭐', 'Superou! 🚀'];
        document.getElementById('modalSubtitle').textContent = msgs[Math.floor(Math.random() * msgs.length)];

        document.getElementById('completionModal').classList.add('show');
    }

    async function finishWorkout() {
        try {
            if (workoutId && alunoId) {
                await db.collection('workouts_completed').add({
                    alunoId,
                    treinoId: workoutId,
                    exercises_done: document.querySelectorAll('.exercise-card.completed').length,
                    duration: document.getElementById('totalTime').textContent,
                    points: parseInt(document.getElementById('totalPoints').textContent),
                    completed_at: new Date()
                });

                await db.collection('alunos').doc(alunoId).update({
                    'gamification.totalWorkouts': firebase.firestore.FieldValue.increment(1),
                    'gamification.totalPoints': firebase.firestore.FieldValue.increment(
                        parseInt(document.getElementById('totalPoints').textContent)
                    )
                });
            }

            showToast('✅ Treino salvo!');
            setTimeout(() => window.location.href = 'app.html', 2000);
        } catch (error) {
            console.error('Erro:', error);
            showToast('❌ Erro ao salvar');
        }
    }

    function createConfetti() {
        for (let i = 0; i < 50; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + '%';
            conf.style.top = '-10px';
            conf.style.background = ['#E07800', '#FF9900', '#00A87A'][Math.floor(Math.random() * 3)];
            conf.style.animation = `fall ${3 + Math.random() * 2}s ease-in forwards`;
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 5000);
        }
    }

    function playVictorySound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.frequency.value = 523.25;
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.1);

            osc.frequency.value = 659.25;
            osc.start(ctx.currentTime + 0.15);
            osc.stop(ctx.currentTime + 0.25);

            osc.frequency.value = 783.99;
            osc.start(ctx.currentTime + 0.3);
            osc.stop(ctx.currentTime + 0.5);
        } catch (e) {}
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function goBack() {
        window.location.href = 'app.html';
    }

    const style = document.createElement('style');
    style.textContent = `@keyframes fall { to { transform: translateY(100vh) rotateZ(360deg); opacity: 0; } }`;
    document.head.appendChild(style);
</script>

</body>
</html>
