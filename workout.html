<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#E07800">
    <title>💪 FITNESS - Executar Treino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f5;
        }

        /* HEADER */
        .workout-header {
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .header-back {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .header-back:hover {
            background: rgba(255,255,255,0.3);
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
        }

        .header-stats {
            display: flex;
            gap: 16px;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.9;
        }

        /* PROGRESS BAR */
        .progress-section {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .progress-text {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #E07800 0%, #FF9900 100%);
            transition: width 0.3s;
        }

        /* MAIN CONTENT */
        .workout-main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .exercises-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .exercise-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }

        .exercise-card.completed {
            opacity: 0.6;
        }

        .exercise-card.active {
            border: 3px solid #E07800;
            box-shadow: 0 8px 24px rgba(224, 120, 0, 0.2);
        }

        .exercise-header {
            background: #f8f8f8;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .exercise-info h3 {
            margin: 0 0 4px 0;
            font-size: 16px;
            color: #333;
        }

        .exercise-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #999;
        }

        .exercise-status {
            font-size: 20px;
        }

        .exercise-body {
            padding: 20px;
            display: none;
        }

        .exercise-body.show {
            display: block;
        }

        /* EXERCISE CONTROLS */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .control-item {
            text-align: center;
        }

        .control-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .control-value {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #f8f8f8;
            border-radius: 8px;
            padding: 12px;
        }

        .btn-control {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #E07800;
            color: white;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 18px;
        }

        .btn-control:hover {
            background: #FF9900;
            transform: scale(1.1);
        }

        .control-display {
            font-size: 24px;
            font-weight: 700;
            color: #E07800;
            min-width: 50px;
        }

        /* TIMER */
        .rest-timer {
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .rest-timer.active {
            display: block;
            animation: pulse 0.6s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .timer-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .timer-display {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 12px;
            font-family: 'Monaco', monospace;
        }

        .timer-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn-timer {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-timer:hover {
            background: white;
            color: #E07800;
        }

        /* PHOTO UPLOAD */
        .photo-section {
            margin-bottom: 20px;
        }

        .photo-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .photo-upload {
            border: 2px dashed #E07800;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .photo-upload:hover {
            background: #fffaf0;
            border-color: #FF9900;
        }

        .photo-upload input {
            display: none;
        }

        .photo-preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        /* ACTIONS */
        .exercise-actions {
            display: flex;
            gap: 12px;
        }

        .btn-primary {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224, 120, 0, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            flex: 1;
            padding: 14px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #E07800;
            color: white;
        }

        /* COMPLETION MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .modal-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }

        .modal-subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .modal-stats {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .modal-stat {
            text-align: center;
        }

        .modal-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #E07800;
        }

        .modal-stat-label {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .modal-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224, 120, 0, 0.3);
        }

        /* CONFETTI */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #E07800;
            pointer-events: none;
            z-index: 1999;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 2000;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .workout-header {
                padding: 16px;
            }

            .header-title {
                font-size: 18px;
            }

            .header-stats {
                flex-wrap: wrap;
                gap: 12px;
            }

            .controls-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .control-value {
                padding: 8px;
            }

            .timer-display {
                font-size: 36px;
            }

            .modal-content {
                padding: 30px;
            }

            .modal-icon {
                font-size: 60px;
            }

            .modal-title {
                font-size: 24px;
            }

            .exercise-actions {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .workout-main {
                padding: 12px;
            }

            .header-stats {
                gap: 8px;
            }

            .stat-value {
                font-size: 14px;
            }

            .stat-label {
                font-size: 10px;
            }

            .controls-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .modal-content {
                padding: 24px;
            }

            .modal-stats {
                grid-template-columns: 1fr;
            }

            .header-back {
                padding: 6px 12px;
                font-size: 12px;
            }
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="workout-header">
    <div class="header-top">
        <button class="header-back" onclick="goBack()">← Voltar</button>
        <h1 class="header-title" id="workoutTitle">Treino</h1>
        <div style="width: 80px;"></div>
    </div>

    <div class="progress-section">
        <div class="progress-text" id="progressText">1 de 1</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
    </div>

    <div class="header-stats">
        <div class="stat-item">
            <span class="stat-value" id="totalExercises">0</span>
            <span class="stat-label">Exercícios</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="completedExercises">0</span>
            <span class="stat-label">Completos</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="totalTime">00:00</span>
            <span class="stat-label">Tempo</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="totalPoints">0</span>
            <span class="stat-label">Pontos</span>
        </div>
    </div>
</header>

<!-- MAIN CONTENT -->
<main class="workout-main">
    <div id="loading" class="loading">Carregando treino...</div>
    <div class="exercises-list" id="exercisesList" style="display: none;"></div>
</main>

<!-- COMPLETION MODAL -->
<div id="completionModal" class="modal">
    <div class="modal-content">
        <div class="modal-icon" id="modalIcon">🎉</div>
        <h2 class="modal-title">Parabéns!</h2>
        <p class="modal-subtitle" id="modalSubtitle">Você completou o treino com excelência!</p>

        <div class="modal-stats">
            <div class="modal-stat">
                <div class="modal-stat-value" id="finalExercises">0</div>
                <div class="modal-stat-label">Exercícios</div>
            </div>
            <div class="modal-stat">
                <div class="modal-stat-value" id="finalTime">00:00</div>
                <div class="modal-stat-label">Tempo</div>
            </div>
            <div class="modal-stat">
                <div class="modal-stat-value" id="finalPoints">0</div>
                <div class="modal-stat-label">Pontos</div>
            </div>
        </div>

        <button class="modal-button" onclick="finishWorkout()">🏠 Voltar ao Dashboard</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
    // Firebase Init
    const firebaseConfig = {
        apiKey: "AIzaSyBK7hpCtjQ6COYOFZw1k2l84tBbjfHqUdI",
        authDomain: "fitness-app-7aa96.firebaseapp.com",
        projectId: "fitness-app-7aa96",
        storageBucket: "fitness-app-7aa96.firebasestorage.app",
        messagingSenderId: "123102660519",
        appId: "1:123102660519:web:b71e04b17fea141e629882"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Global State
    let currentUser = null;
    let workoutData = null;
    let workoutStartTime = Date.now();
    let timerInterval = null;
    let currentExerciseIndex = 0;
    let restTimers = {};
    let photos = {};
    let exerciseData = {};

    const urlParams = new URLSearchParams(window.location.search);
    const alunoId = urlParams.get('alunoId');
    const workoutId = urlParams.get('workoutId');

    // Check Auth
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        currentUser = user;
        initializeWorkout();
    });

    async function initializeWorkout() {
        try {
            // Buscar treino
            const workoutDoc = await db.collection('treinos').doc(workoutId).get();
            if (!workoutDoc.exists) {
                showToast('❌ Treino não encontrado');
                setTimeout(() => goBack(), 2000);
                return;
            }

            workoutData = { id: workoutDoc.id, ...workoutDoc.data() };

            // Buscar aluno
            const alunoDoc = await db.collection('alunos').doc(alunoId).get();
            const alunoName = alunoDoc.data().name;

            document.getElementById('workoutTitle').textContent = workoutData.name;
            document.getElementById('loading').style.display = 'none';

            renderExercises();
            startTimer();

            // Estratégia Neurolinguística: Motivação inicial
            showToast(`💪 ${alunoName}, vamos conquistar esse treino!`);

        } catch (error) {
            console.error('Erro:', error);
            showToast('❌ Erro ao carregar treino');
        }
    }

    function renderExercises() {
        const container = document.getElementById('exercisesList');
        container.style.display = 'block';

        document.getElementById('totalExercises').textContent = workoutData.exercises.length;

        container.innerHTML = workoutData.exercises.map((exercise, index) => `
            <div class="exercise-card" id="exercise-${index}" data-index="${index}">
                <div class="exercise-header" onclick="toggleExercise(${index})">
                    <div class="exercise-info">
                        <h3>${exercise.name}</h3>
                        <div class="exercise-meta">
                            <span>${exercise.sets || 0} séries</span>
                            <span>${exercise.reps || 0} reps</span>
                            <span>${exercise.weight || 0}kg</span>
                            <span>${exercise.rest || 0}s descanso</span>
                        </div>
                    </div>
                    <div class="exercise-status" id="status-${index}">⭕</div>
                </div>

                <div class="exercise-body" id="body-${index}">
                    <div class="controls-grid">
                        <div class="control-item">
                            <span class="control-label">Séries</span>
                            <div class="control-value">
                                <button class="btn-control" onclick="changeSets(${index}, -1)">−</button>
                                <span class="control-display" id="sets-${index}">${exercise.sets || 0}</span>
                                <button class="btn-control" onclick="changeSets(${index}, 1)">+</button>
                            </div>
                        </div>
                        <div class="control-item">
                            <span class="control-label">Reps</span>
                            <div class="control-value">
                                <button class="btn-control" onclick="changeReps(${index}, -1)">−</button>
                                <span class="control-display" id="reps-${index}">${exercise.reps || 0}</span>
                                <button class="btn-control" onclick="changeReps(${index}, 1)">+</button>
                            </div>
                        </div>
                        <div class="control-item">
                            <span class="control-label">Peso (kg)</span>
                            <div class="control-value">
                                <button class="btn-control" onclick="changeWeight(${index}, -5)">−</button>
                                <span class="control-display" id="weight-${index}">${exercise.weight || 0}</span>
                                <button class="btn-control" onclick="changeWeight(${index}, 5)">+</button>
                            </div>
                        </div>
                    </div>

                    <div class="rest-timer" id="timer-${index}">
                        <div class="timer-label">Tempo de Descanso</div>
                        <div class="timer-display" id="timer-display-${index}">00:00</div>
                        <div class="timer-buttons">
                            <button class="btn-timer" onclick="pauseTimer(${index})">⏸️ Pausar</button>
                            <button class="btn-timer" onclick="resumeTimer(${index})">▶️ Retomar</button>
                            <button class="btn-timer" onclick="skipTimer(${index})">⏭️ Pular</button>
                        </div>
                    </div>

                    <div class="photo-section">
                        <label class="photo-label">📸 Foto do Exercício</label>
                        <div class="photo-upload" onclick="triggerPhotoUpload(${index})">
                            <div id="photo-preview-${index}"></div>
                            <p>📷 Clique para tirar ou selecionar foto</p>
                            <input type="file" id="photo-input-${index}" accept="image/*" onchange="handlePhotoUpload(${index}, event)">
                        </div>
                    </div>

                    <div class="exercise-actions">
                        <button class="btn-primary" onclick="completeExercise(${index})">✅ Completo</button>
                        <button class="btn-secondary" onclick="skipExercise(${index})">⏭️ Pular</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function toggleExercise(index) {
        const body = document.getElementById(`body-${index}`);
        body.classList.toggle('show');
        
        const card = document.getElementById(`exercise-${index}`);
        card.classList.toggle('active');
    }

    function changeSets(index, delta) {
        const element = document.getElementById(`sets-${index}`);
        let value = parseInt(element.textContent) + delta;
        if (value < 0) value = 0;
        element.textContent = value;
        exerciseData[index] = exerciseData[index] || {};
        exerciseData[index].sets = value;
    }

    function changeReps(index, delta) {
        const element = document.getElementById(`reps-${index}`);
        let value = parseInt(element.textContent) + delta;
        if (value < 0) value = 0;
        element.textContent = value;
        exerciseData[index] = exerciseData[index] || {};
        exerciseData[index].reps = value;
    }

    function changeWeight(index, delta) {
        const element = document.getElementById(`weight-${index}`);
        let value = parseInt(element.textContent) + delta;
        if (value < 0) value = 0;
        element.textContent = value;
        exerciseData[index] = exerciseData[index] || {};
        exerciseData[index].weight = value;
    }

    function triggerPhotoUpload(index) {
        document.getElementById(`photo-input-${index}`).click();
    }

    function handlePhotoUpload(index, event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            photos[index] = e.target.result;
            const preview = document.getElementById(`photo-preview-${index}`);
            preview.innerHTML = `<img src="${e.target.result}" class="photo-preview" alt="Exercício">`;
        };
        reader.readAsDataURL(file);
    }

    function completeExercise(index) {
        const card = document.getElementById(`exercise-${index}`);
        const status = document.getElementById(`status-${index}`);

        // Estratégia Neurolinguística: Positive anchor
        const messages = [
            '💪 Excelente execução!',
            '🔥 Você está destruindo!',
            '⚡ Força pura!',
            '🎯 Perfeito!',
            '🏆 Campeão!'
        ];

        card.classList.add('completed');
        status.textContent = '✅';

        // Vibração haptic
        if (navigator.vibrate) {
            navigator.vibrate([100, 50, 100]);
        }

        showToast(messages[Math.floor(Math.random() * messages.length)]);

        // Adicionar pontos
        const points = 100 + (exerciseData[index]?.sets || 0) * 10;
        document.getElementById('totalPoints').textContent = 
            (parseInt(document.getElementById('totalPoints').textContent) + points).toString();

        // Atualizar progresso
        const completed = document.querySelectorAll('.exercise-card.completed').length;
        document.getElementById('completedExercises').textContent = completed;

        const progress = (completed / workoutData.exercises.length) * 100;
        document.getElementById('progressFill').style.width = progress + '%';
        document.getElementById('progressText').textContent = `${completed} de ${workoutData.exercises.length}`;

        // Verificar se todos estão completos
        if (completed === workoutData.exercises.length) {
            finishWorkoutSession();
        }
    }

    function skipExercise(index) {
        completeExercise(index);
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - workoutStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('totalTime').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }, 1000);
    }

    function pauseTimer(index) {
        const rest = workoutData.exercises[index].rest || 60;
        let remaining = rest;

        const timerElement = document.getElementById(`timer-display-${index}`);
        const timerContainer = document.getElementById(`timer-${index}`);
        timerContainer.classList.add('active');

        restTimers[index] = setInterval(() => {
            remaining--;

            const mins = Math.floor(remaining / 60);
            const secs = remaining % 60;
            timerElement.textContent = 
                `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

            if (remaining <= 0) {
                clearInterval(restTimers[index]);
                timerContainer.classList.remove('active');
                showToast('🔔 Hora de voltar ao treino!');

                // Som de alerta
                playSound();
            }
        }, 1000);
    }

    function resumeTimer(index) {
        pauseTimer(index);
    }

    function skipTimer(index) {
        clearInterval(restTimers[index]);
        document.getElementById(`timer-${index}`).classList.remove('active');
    }

    function finishWorkoutSession() {
        clearInterval(timerInterval);

        // Confetti
        createConfetti();

        // Som de vitória
        playVictorySound();

        // Atualizar modal
        const totalTime = document.getElementById('totalTime').textContent;
        const totalPoints = document.getElementById('totalPoints').textContent;

        document.getElementById('finalExercises').textContent = workoutData.exercises.length;
        document.getElementById('finalTime').textContent = totalTime;
        document.getElementById('finalPoints').textContent = totalPoints;

        // Estratégia Neurolinguística: Conclusão positiva
        const subtitles = [
            'Você é incrivelmente forte! 💪',
            'Que treino épico! 🔥',
            'Você é um campeão! 🏆',
            'Isso foi extraordinário! ⭐',
            'Você superou a si mesmo! 🚀'
        ];

        document.getElementById('modalSubtitle').textContent = 
            subtitles[Math.floor(Math.random() * subtitles.length)];

        document.getElementById('completionModal').classList.add('show');
    }

    async function finishWorkout() {
        try {
            // Salvar treino no Firestore
            await db.collection('workouts_completed').add({
                alunoId: alunoId,
                treinoId: workoutId,
                exercises_done: workoutData.exercises.length,
                duration: document.getElementById('totalTime').textContent,
                completed_at: new Date(),
                points: parseInt(document.getElementById('totalPoints').textContent),
                photos: Object.keys(photos).length
            });

            // Atualizar gamification do aluno
            const alunoRef = db.collection('alunos').doc(alunoId);
            await alunoRef.update({
                'gamification.totalWorkouts': firebase.firestore.FieldValue.increment(1),
                'gamification.totalPoints': firebase.firestore.FieldValue.increment(parseInt(document.getElementById('totalPoints').textContent))
            });

            showToast('✅ Treino salvo com sucesso!');
            setTimeout(() => {
                window.location.href = 'app.html';
            }, 2000);

        } catch (error) {
            console.error('Erro ao salvar treino:', error);
            showToast('❌ Erro ao salvar treino');
        }
    }

    function createConfetti() {
        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = '-10px';
            confetti.style.background = ['#E07800', '#FF9900', '#00A87A'][Math.floor(Math.random() * 3)];
            confetti.style.animation = `confettiFall ${3 + Math.random() * 2}s ease-in forwards`;
            document.body.appendChild(confetti);

            setTimeout(() => confetti.remove(), 5000);
        }
    }

    function playVictorySound() {
        // Criar som usando Web Audio API
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        // Melodia de vitória
        oscillator.frequency.value = 523.25; // C5
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.1);

        oscillator.frequency.value = 659.25; // E5
        oscillator.start(audioContext.currentTime + 0.15);
        oscillator.stop(audioContext.currentTime + 0.25);

        oscillator.frequency.value = 783.99; // G5
        oscillator.start(audioContext.currentTime + 0.3);
        oscillator.stop(audioContext.currentTime + 0.5);
    }

    function playSound() {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.frequency.value = 800;
        gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.2);
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function goBack() {
        window.location.href = 'app.html';
    }

    // Adicionar keyframe de confetti ao head se não existir
    if (!document.querySelector('style[data-confetti]')) {
        const style = document.createElement('style');
        style.setAttribute('data-confetti', 'true');
        style.textContent = `
            @keyframes confettiFall {
                to {
                    transform: translateY(100vh) rotateZ(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    }
</script>
