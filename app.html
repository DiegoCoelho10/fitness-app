<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#E07800">
    <title>💪 FITNESS - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .app-header {
            background: white;
            border-bottom: 1px solid #eee;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 18px;
            color: #333;
        }

        .header-nav {
            display: flex;
            gap: 8px;
            flex: 1;
            margin-left: 40px;
        }

        .nav-btn {
            padding: 8px 16px;
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            color: #666;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-btn.active {
            background: #fffaf0;
            color: #E07800;
            border: 1px solid #FFE0C0;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #E07800;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-logout {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: #E07800;
            color: white;
        }

        .app-main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .page {
            display: none;
        }

        .page.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .dashboard-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-icon {
            font-size: 40px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #E07800;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            margin: 0;
            font-size: 24px;
            color: #333;
        }

        .btn-primary {
            padding: 12px 24px;
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224, 120, 0, 0.3);
        }

        .btn-secondary {
            padding: 10px 20px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #E07800;
            color: white;
        }

        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .student-card {
            background: linear-gradient(135deg, #fff9f5 0%, #ffe8d6 100%);
            border: 2px solid #FFE0C0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .student-card:hover {
            transform: translateY(-4px);
            border-color: #E07800;
            box-shadow: 0 8px 24px rgba(224, 120, 0, 0.15);
        }

        .student-header {
            height: 150px;
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .student-body {
            padding: 16px;
        }

        .student-name {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }

        .student-goal {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }

        .student-actions {
            display: flex;
            gap: 8px;
        }

        .student-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-edit {
            background: #E07800;
            color: white;
        }

        .btn-delete {
            background: #f0f0f0;
            color: #d32f2f;
        }

        .form-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            text-transform: uppercase;
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #E07800;
            box-shadow: 0 0 0 3px rgba(224, 120, 0, 0.1);
        }

        .form-full {
            grid-column: 1 / -1;
        }

        .form-actions {
            display: flex;
            gap: 12px;
        }

        .chat-container {
            background: white;
            border-radius: 12px;
            padding: 0;
            height: 600px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .chat-header {
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s;
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-break: break-word;
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
        }

        .message.other .message-content {
            background: #f0f0f0;
            color: #333;
        }

        .chat-input {
            display: flex;
            gap: 8px;
            padding: 16px;
            border-top: 1px solid #eee;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .chat-input button {
            padding: 12px 16px;
            background: #E07800;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .ranking-container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .podium {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
            align-items: flex-end;
        }

        .podium-item {
            text-align: center;
            border-radius: 12px;
            padding: 20px;
            color: white;
        }

        .podium-item.gold {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            order: 2;
            transform: scale(1.1);
        }

        .podium-item.silver {
            background: linear-gradient(135deg, #C0C0C0 0%, #A9A9A9 100%);
            order: 1;
            transform: scale(0.95);
        }

        .podium-item.bronze {
            background: linear-gradient(135deg, #CD7F32 0%, #8B4513 100%);
            order: 3;
            transform: scale(0.9);
        }

        .medal {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .podium-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .podium-points {
            font-size: 20px;
            font-weight: 700;
        }

        .ranking-table {
            width: 100%;
        }

        .ranking-header {
            display: grid;
            grid-template-columns: 80px 1fr 120px 120px 120px;
            gap: 16px;
            padding: 16px;
            background: #f8f8f8;
            border-radius: 8px;
            font-weight: 600;
            color: #666;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .ranking-row {
            display: grid;
            grid-template-columns: 80px 1fr 120px 120px 120px;
            gap: 16px;
            padding: 16px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .rank-badge {
            background: #E07800;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin: 0 auto;
        }

        .profile-section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eee;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            flex-shrink: 0;
        }

        .profile-info h1 {
            margin: 0 0 8px 0;
            font-size: 28px;
            color: #333;
        }

        .profile-info p {
            margin: 0;
            color: #999;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            z-index: 2000;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 24px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 1024px) {
            .header-nav {
                display: none;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .students-grid {
                grid-template-columns: 1fr;
            }

            .chat-container {
                height: 400px;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                height: 60px;
                gap: 12px;
            }

            .header-nav {
                display: none;
            }

            .btn-logout {
                display: none;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .form-container {
                grid-template-columns: 1fr;
            }

            .chat-container {
                height: 300px;
            }

            .ranking-header, .ranking-row {
                grid-template-columns: 1fr;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .podium {
                grid-template-columns: 1fr;
            }

            .podium-item {
                transform: scale(1) !important;
                order: unset !important;
            }
        }

        @media (max-width: 480px) {
            .app-main {
                padding: 12px;
            }

            .dashboard-title {
                font-size: 24px;
            }

            .student-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="header-content">
            <a href="#" class="logo">
                <span>💪</span>
                <span>FITNESS</span>
            </a>

            <nav class="header-nav" id="headerNav"></nav>

            <div class="header-actions">
                <div class="user-avatar" id="userAvatar" onclick="showPage('profile')">👤</div>
                <button class="btn-logout" onclick="handleLogout()">Sair</button>
            </div>
        </div>
    </header>

    <main class="app-main" id="appMain">
        <!-- DASHBOARD PAGE -->
        <div id="dashboardPage" class="page show">
            <h1 class="dashboard-title" id="dashboardTitle">Bem-vindo!</h1>
            <div class="stats-grid" id="statsGrid"></div>

            <!-- ALUNOS PT -->
            <div class="section" id="studentsSection" style="display: none;">
                <div class="section-header">
                    <h2>Seus Alunos</h2>
                    <button class="btn-primary" onclick="showPage('addStudent')">➕ Novo Aluno</button>
                </div>
                <div class="students-grid" id="studentsGrid"></div>
            </div>

            <!-- GAMIFICAÇÃO ALUNO -->
            <div class="section" id="gamificationSection" style="display: none;">
                <h2 style="margin-bottom: 20px;">🎮 Seu Progresso</h2>
                <div id="gamificationContent"></div>
            </div>
        </div>

        <!-- ADD STUDENT -->
        <div id="addStudentPage" class="page">
            <div class="section">
                <div class="section-header">
                    <h2>Adicionar Aluno</h2>
                    <button class="btn-secondary" onclick="showPage('dashboard')">← Voltar</button>
                </div>

                <form onsubmit="handleAddStudent(event)">
                    <div class="form-container">
                        <div class="form-group">
                            <label>Nome</label>
                            <input type="text" id="studentName" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="studentEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Telefone</label>
                            <input type="tel" id="studentPhone">
                        </div>
                        <div class="form-group">
                            <label>Objetivo</label>
                            <input type="text" id="studentGoal">
                        </div>
                        <div class="form-group">
                            <label>Altura (cm)</label>
                            <input type="number" id="studentHeight" step="0.1">
                        </div>
                        <div class="form-group">
                            <label>Peso (kg)</label>
                            <input type="number" id="studentWeight" step="0.1">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Adicionar</button>
                        <button type="button" class="btn-secondary" onclick="showPage('dashboard')">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- CREATE WORKOUT -->
        <div id="createWorkoutPage" class="page">
            <div class="section">
                <div class="section-header">
                    <h2>Criar Treino</h2>
                    <button class="btn-secondary" onclick="showPage('dashboard')">← Voltar</button>
                </div>

                <form onsubmit="handleCreateWorkout(event)">
                    <div class="form-container">
                        <div class="form-group">
                            <label>Selecione Aluno</label>
                            <select id="workoutAluno" required onchange="loadAlunoList()">
                                <option value="">Escolha...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Nome do Treino</label>
                            <input type="text" id="workoutName" required>
                        </div>
                        <div class="form-group">
                            <label>Dificuldade</label>
                            <select id="workoutDifficulty">
                                <option value="facil">Fácil</option>
                                <option value="moderado" selected>Moderado</option>
                                <option value="dificil">Difícil</option>
                            </select>
                        </div>
                        <div class="form-group form-full">
                            <label>Descrição</label>
                            <textarea id="workoutDesc" rows="3"></textarea>
                        </div>
                    </div>

                    <div style="background: #f8f8f8; padding: 16px; border-radius: 8px; margin-bottom: 16px;">
                        <h3 style="margin: 0 0 12px 0;">Exercícios</h3>
                        <div id="exercisesList"></div>
                        <button type="button" class="btn-primary" style="width: 100%; margin-top: 12px;" onclick="addExerciseField()">➕ Exercício</button>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Criar Treino</button>
                        <button type="button" class="btn-secondary" onclick="showPage('dashboard')">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- CHAT -->
        <div id="chatPage" class="page">
            <div class="chat-container" id="chatContainer"></div>
        </div>

        <!-- RANKING -->
        <div id="rankingPage" class="page">
            <div class="ranking-container">
                <h2 style="margin-bottom: 30px;">🏆 Ranking</h2>
                <div class="podium" id="podium"></div>
                <div class="ranking-table">
                    <div class="ranking-header">
                        <div>Posição</div>
                        <div>Aluno</div>
                        <div>Treinos</div>
                        <div>Pontos</div>
                        <div>Sequência</div>
                    </div>
                    <div id="rankingList"></div>
                </div>
            </div>
        </div>

        <!-- PROFILE -->
        <div id="profilePage" class="page">
            <div class="profile-section">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar">👤</div>
                    <div>
                        <h1 id="profileName">Seu Nome</h1>
                        <p id="profileRole">Aluno</p>
                    </div>
                </div>

                <form onsubmit="handleUpdateProfile(event)">
                    <div class="form-container">
                        <div class="form-group">
                            <label>Nome</label>
                            <input type="text" id="profileNameInput" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="profileEmailInput" readonly>
                        </div>
                        <div class="form-group">
                            <label>Telefone</label>
                            <input type="tel" id="profilePhoneInput">
                        </div>
                        <div class="form-group" id="profileGoalDiv" style="display: none;">
                            <label>Objetivo</label>
                            <input type="text" id="profileGoalInput">
                        </div>
                        <div class="form-group" id="profileHeightDiv" style="display: none;">
                            <label>Altura (cm)</label>
                            <input type="number" id="profileHeightInput" step="0.1">
                        </div>
                        <div class="form-group" id="profileWeightDiv" style="display: none;">
                            <label>Peso (kg)</label>
                            <input type="number" id="profileWeightInput" step="0.1">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBK7hpCtjQ6COYOFZw1k2l84tBbjfHqUdI",
        authDomain: "fitness-app-7aa96.firebaseapp.com",
        projectId: "fitness-app-7aa96",
        storageBucket: "fitness-app-7aa96.firebasestorage.app",
        messagingSenderId: "123102660519",
        appId: "1:123102660519:web:b71e04b17fea141e629882"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let userRole = null;
    let userProfile = null;
    let alunoList = [];

    auth.onAuthStateChanged(async user => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        currentUser = user;
        await initializeApp();
    });

    async function initializeApp() {
        try {
            const ptDoc = await db.collection('users').doc(currentUser.uid).get();
            if (ptDoc.exists) {
                userRole = 'pt';
                userProfile = ptDoc.data();
            } else {
                const alunosSnap = await db.collection('alunos').where('uid', '==', currentUser.uid).get();
                if (!alunosSnap.empty) {
                    userRole = 'aluno';
                    userProfile = { id: alunosSnap.docs[0].id, ...alunosSnap.docs[0].data() };
                } else {
                    userRole = 'aluno';
                    userProfile = { uid: currentUser.uid, name: currentUser.email };
                }
            }

            setupUI();
            loadDashboard();
        } catch (error) {
            console.error('Erro:', error);
            showToast('❌ Erro ao carregar');
        }
    }

    function setupUI() {
        document.getElementById('userAvatar').textContent = userProfile.name?.charAt(0).toUpperCase() || 'U';

        const nav = document.getElementById('headerNav');
        if (userRole === 'pt') {
            nav.innerHTML = `
                <button class="nav-btn active" onclick="showPage('dashboard')">Dashboard</button>
                <button class="nav-btn" onclick="showPage('ranking')">Ranking</button>
            `;
        } else {
            nav.innerHTML = `<button class="nav-btn active" onclick="showPage('dashboard')">Meu Treino</button>`;
        }
    }

    async function loadDashboard() {
        const title = document.getElementById('dashboardTitle');
        const hora = new Date().getHours();
        const saudacao = hora < 12 ? 'Bom dia' : hora < 18 ? 'Boa tarde' : 'Boa noite';
        title.textContent = `${saudacao}, ${userProfile.name}! 👋`;

        if (userRole === 'pt') {
            await loadPTDashboard();
        } else {
            await loadAlunoDashboard();
        }
    }

    async function loadPTDashboard() {
        const studentsSnap = await db.collection('alunos').get();
        alunoList = studentsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        const stats = `
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div>
                    <div class="stat-value">${alunoList.length}</div>
                    <div class="stat-label">Alunos</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💪</div>
                <div>
                    <div class="stat-value">${alunoList.reduce((sum, a) => sum + (a.gamification?.totalWorkouts || 0), 0)}</div>
                    <div class="stat-label">Treinos</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div>
                    <div class="stat-value">${alunoList.reduce((sum, a) => sum + (a.gamification?.totalPoints || 0), 0)}</div>
                    <div class="stat-label">Pontos</div>
                </div>
            </div>
        `;

        document.getElementById('statsGrid').innerHTML = stats;
        document.getElementById('studentsSection').style.display = 'block';

        const studentsCards = alunoList.map(aluno => `
            <div class="student-card">
                <div class="student-header">👤</div>
                <div class="student-body">
                    <div class="student-name">${aluno.name}</div>
                    <div class="student-goal">${aluno.goal || 'Sem meta'}</div>
                    <div class="student-actions">
                        <button class="btn-edit" onclick="startCreateWorkout('${aluno.id}')">➕ Treino</button>
                    </div>
                </div>
            </div>
        `).join('');

        document.getElementById('studentsGrid').innerHTML = studentsCards || '<p>Nenhum aluno</p>';
    }

    async function loadAlunoDashboard() {
        const stats = `
            <div class="stat-card">
                <div class="stat-icon">💪</div>
                <div>
                    <div class="stat-value">${userProfile.gamification?.totalWorkouts || 0}</div>
                    <div class="stat-label">Treinos</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div>
                    <div class="stat-value">${userProfile.gamification?.totalPoints || 0}</div>
                    <div class="stat-label">Pontos</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div>
                    <div class="stat-value">${userProfile.gamification?.streak || 0}</div>
                    <div class="stat-label">Sequência</div>
                </div>
            </div>
        `;

        document.getElementById('statsGrid').innerHTML = stats;
        document.getElementById('gamificationSection').style.display = 'block';

        const points = userProfile.gamification?.totalPoints || 0;
        let level = 'Novato';
        if (points >= 500) level = 'Guerreiro';
        if (points >= 1500) level = 'Lendário';
        if (points >= 3000) level = 'Supremo';

        document.getElementById('gamificationContent').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="font-size: 30px;">🎯</div>
                    <div>
                        <div class="stat-value" style="font-size: 20px;">${level}</div>
                        <div class="stat-label">Seu Nível</div>
                    </div>
                </div>
            </div>
            <p style="color: #666; margin-top: 16px;">Você está evoluindo! Continue treinando!</p>
        `;
    }

    async function handleAddStudent(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;

        try {
            await db.collection('alunos').add({
                uid: '',
                type: 'aluno',
                name: document.getElementById('studentName').value,
                email: document.getElementById('studentEmail').value,
                phone: document.getElementById('studentPhone').value,
                goal: document.getElementById('studentGoal').value,
                personalTrainerId: currentUser.uid,
                gamification: { points: 0, streak: 0, badges: [], totalWorkouts: 0, totalPoints: 0 },
                createdAt: new Date()
            });

            showToast('✅ Aluno adicionado!');
            showPage('dashboard');
            loadDashboard();
        } catch (error) {
            showToast('❌ Erro ao adicionar');
        }

        btn.disabled = false;
    }

    function startCreateWorkout(alunoId) {
        document.getElementById('workoutAluno').value = alunoId;
        showPage('createWorkout');
    }

    async function handleCreateWorkout(e) {
        e.preventDefault();
        const alunoId = document.getElementById('workoutAluno').value;
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;

        try {
            const exercises = [];
            document.querySelectorAll('.exercise-input').forEach(input => {
                const name = input.value;
                if (name) exercises.push({ name, sets: 3, reps: 10, weight: 0 });
            });

            await db.collection('treinos').add({
                alunoId,
                personalTrainerId: currentUser.uid,
                name: document.getElementById('workoutName').value,
                difficulty: document.getElementById('workoutDifficulty').value,
                description: document.getElementById('workoutDesc').value,
                exercises,
                createdAt: new Date()
            });

            showToast('✅ Treino criado!');
            showPage('dashboard');
            e.target.reset();
        } catch (error) {
            showToast('❌ Erro ao criar treino');
        }

        btn.disabled = false;
    }

    function addExerciseField() {
        const div = document.createElement('div');
        div.style.marginBottom = '12px';
        div.innerHTML = `<input type="text" class="exercise-input" placeholder="Nome do exercício" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px;">`;
        document.getElementById('exercisesList').appendChild(div);
    }

    async function handleUpdateProfile(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;

        try {
            if (userRole === 'pt') {
                await db.collection('users').doc(currentUser.uid).update({
                    name: document.getElementById('profileNameInput').value,
                    phone: document.getElementById('profilePhoneInput').value
                });
            } else {
                await db.collection('alunos').doc(userProfile.id).update({
                    name: document.getElementById('profileNameInput').value,
                    phone: document.getElementById('profilePhoneInput').value,
                    goal: document.getElementById('profileGoalInput').value,
                    height: document.getElementById('profileHeightInput').value
                });
            }

            showToast('✅ Perfil atualizado!');
            initializeApp();
        } catch (error) {
            showToast('❌ Erro ao atualizar');
        }

        btn.disabled = false;
    }

    async function loadRanking() {
        const alunos = await db.collection('alunos').orderBy('gamification.totalPoints', 'desc').limit(10).get();
        const docs = alunos.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        if (docs.length >= 3) {
            const podium = `
                <div class="podium-item gold">
                    <div class="medal">🥇</div>
                    <div class="podium-name">${docs[0].name}</div>
                    <div class="podium-points">${docs[0].gamification?.totalPoints || 0} pts</div>
                </div>
                <div class="podium-item silver">
                    <div class="medal">🥈</div>
                    <div class="podium-name">${docs[1].name}</div>
                    <div class="podium-points">${docs[1].gamification?.totalPoints || 0} pts</div>
                </div>
                <div class="podium-item bronze">
                    <div class="medal">🥉</div>
                    <div class="podium-name">${docs[2].name}</div>
                    <div class="podium-points">${docs[2].gamification?.totalPoints || 0} pts</div>
                </div>
            `;
            document.getElementById('podium').innerHTML = podium;
        }

        const ranking = docs.map((doc, index) => `
            <div class="ranking-row">
                <div class="rank-badge">#${index + 1}</div>
                <div>${doc.name}</div>
                <div>${doc.gamification?.totalWorkouts || 0}</div>
                <div>${doc.gamification?.totalPoints || 0}</div>
                <div>🔥 ${doc.gamification?.streak || 0}</div>
            </div>
        `).join('');

        document.getElementById('rankingList').innerHTML = ranking;
    }

    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
        document.getElementById(page + 'Page').classList.add('show');

        if (page === 'ranking') loadRanking();
        if (page === 'profile') loadProfile();
    }

    function loadProfile() {
        document.getElementById('profileName').textContent = userProfile.name || 'Seu Nome';
        document.getElementById('profileRole').textContent = userRole === 'pt' ? 'Personal Trainer' : 'Aluno';
        document.getElementById('profileAvatar').textContent = userProfile.name?.charAt(0).toUpperCase() || 'U';
        document.getElementById('profileNameInput').value = userProfile.name || '';
        document.getElementById('profileEmailInput').value = currentUser.email;
        document.getElementById('profilePhoneInput').value = userProfile.phone || '';

        if (userRole === 'aluno') {
            document.getElementById('profileGoalDiv').style.display = 'block';
            document.getElementById('profileHeightDiv').style.display = 'block';
            document.getElementById('profileWeightDiv').style.display = 'block';
            document.getElementById('profileGoalInput').value = userProfile.goal || '';
            document.getElementById('profileHeightInput').value = userProfile.height || '';
            document.getElementById('profileWeightInput').value = userProfile.weight || '';
        }
    }

    function loadAlunoList() {
        const select = document.getElementById('workoutAluno');
        select.innerHTML = '<option value="">Escolha...</option>';
        alunoList.forEach(aluno => {
            const option = document.createElement('option');
            option.value = aluno.id;
            option.textContent = aluno.name;
            select.appendChild(option);
        });
    }

    function handleLogout() {
        if (confirm('Sair?')) {
            auth.signOut();
            window.location.href = 'index.html';
        }
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
</script>

</body>
</html>
