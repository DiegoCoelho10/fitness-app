<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#E07800">
    <title>💪 FITNESS - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f5;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .app-header {
            background: white;
            border-bottom: 1px solid #eee;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 18px;
            color: #333;
        }

        .header-nav {
            display: flex;
            gap: 8px;
            flex: 1;
            margin-left: 40px;
        }

        .nav-btn {
            padding: 8px 16px;
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            color: #666;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-btn.active {
            background: #fffaf0;
            color: #E07800;
            border: 1px solid #FFE0C0;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #E07800;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-avatar:hover {
            background: #FF9900;
            transform: scale(1.1);
        }

        .btn-logout {
            padding: 10px 16px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 13px;
        }

        .btn-logout:hover {
            background: #b71c1c;
        }

        .app-main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .page {
            display: none;
        }

        .page.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .dashboard-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-icon {
            font-size: 40px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #E07800;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .section-header h2 {
            margin: 0;
            font-size: 24px;
            color: #333;
        }

        .btn-primary {
            padding: 12px 24px;
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224, 120, 0, 0.3);
        }

        .btn-secondary {
            padding: 10px 20px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #E07800;
            color: white;
        }

        .btn-approve {
            padding: 8px 16px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }

        .btn-approve:hover {
            background: #388e3c;
        }

        .btn-reject {
            padding: 8px 16px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }

        .btn-reject:hover {
            background: #d32f2f;
        }

        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .student-card {
            background: linear-gradient(135deg, #fff9f5 0%, #ffe8d6 100%);
            border: 2px solid #FFE0C0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .student-card:hover {
            transform: translateY(-4px);
            border-color: #E07800;
            box-shadow: 0 8px 24px rgba(224, 120, 0, 0.15);
        }

        .student-header {
            height: 150px;
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .student-body {
            padding: 16px;
        }

        .student-name {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }

        .student-goal {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }

        .student-actions {
            display: flex;
            gap: 8px;
        }

        .student-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .pending-card {
            background: linear-gradient(135deg, #fff3cd 0%, #ffe8b6 100%);
            border: 2px solid #ffc107;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .pending-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .pending-name {
            font-size: 16px;
            font-weight: 700;
            color: #333;
        }

        .pending-email {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }

        .pending-actions {
            display: flex;
            gap: 8px;
        }

        .form-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            text-transform: uppercase;
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #E07800;
            box-shadow: 0 0 0 3px rgba(224, 120, 0, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 12px;
        }

        .profile-section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eee;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            flex-shrink: 0;
        }

        .profile-info h1 {
            margin: 0 0 8px 0;
            font-size: 28px;
            color: #333;
        }

        .ranking-table {
            width: 100%;
        }

        .ranking-header {
            display: grid;
            grid-template-columns: 80px 1fr 120px 120px 120px;
            gap: 16px;
            padding: 16px;
            background: #f8f8f8;
            border-radius: 8px;
            font-weight: 600;
            color: #666;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .ranking-row {
            display: grid;
            grid-template-columns: 80px 1fr 120px 120px 120px;
            gap: 16px;
            padding: 16px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .rank-badge {
            background: #E07800;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin: 0 auto;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            z-index: 2000;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 1024px) {
            .header-nav {
                display: none;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header-content {
                height: 60px;
                gap: 8px;
            }

            .header-nav {
                display: none;
            }

            .logo {
                font-size: 16px;
            }

            .btn-logout {
                padding: 8px 12px;
                font-size: 12px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .students-grid {
                grid-template-columns: 1fr;
            }

            .form-container {
                grid-template-columns: 1fr;
            }

            .ranking-header, .ranking-row {
                grid-template-columns: 1fr;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .app-main {
                padding: 12px;
            }

            .section {
                padding: 16px;
            }
        }

        @media (max-width: 480px) {
            .dashboard-title {
                font-size: 24px;
            }

            .student-actions {
                flex-direction: column;
            }

            .student-actions button {
                padding: 10px;
            }

            .pending-actions {
                flex-direction: column;
            }

            .pending-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="header-content">
            <a href="#" class="logo">
                <span>💪</span>
                <span>FITNESS</span>
            </a>

            <nav class="header-nav" id="headerNav"></nav>

            <div class="header-actions">
                <div class="user-avatar" id="userAvatar" onclick="showPage('profile')">👤</div>
                <button class="btn-logout" onclick="handleLogout()">Sair</button>
            </div>
        </div>
    </header>

    <main class="app-main" id="appMain">
        <!-- DASHBOARD PAGE -->
        <div id="dashboardPage" class="page show">
            <h1 class="dashboard-title" id="dashboardTitle">Bem-vindo!</h1>
            <div class="stats-grid" id="statsGrid"></div>

            <!-- ALUNOS PENDENTES (PT ONLY) -->
            <div class="section" id="pendingSection" style="display: none;">
                <div class="section-header">
                    <h2>⏳ Alunos Pendentes de Aprovação</h2>
                </div>
                <div id="pendingList"></div>
            </div>

            <!-- ALUNOS APROVADOS (PT ONLY) -->
            <div class="section" id="studentsSection" style="display: none;">
                <div class="section-header">
                    <h2>Seus Alunos</h2>
                    <button class="btn-primary" onclick="showPage('addStudent')">➕ Novo Aluno</button>
                </div>
                <div class="students-grid" id="studentsGrid"></div>
            </div>

            <!-- GAMIFICAÇÃO (ALUNO ONLY) -->
            <div class="section" id="gamificationSection" style="display: none;">
                <h2 style="margin-bottom: 20px;">🎮 Seu Progresso</h2>
                <div id="gamificationContent"></div>
            </div>
        </div>

        <!-- ADD STUDENT -->
        <div id="addStudentPage" class="page">
            <div class="section">
                <div class="section-header">
                    <h2>Adicionar Aluno</h2>
                    <button class="btn-secondary" onclick="showPage('dashboard')">← Voltar</button>
                </div>

                <form onsubmit="handleAddStudent(event)">
                    <div class="form-container">
                        <div class="form-group">
                            <label>Nome</label>
                            <input type="text" id="studentName" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="studentEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Telefone</label>
                            <input type="tel" id="studentPhone">
                        </div>
                        <div class="form-group">
                            <label>Objetivo</label>
                            <input type="text" id="studentGoal">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Adicionar</button>
                        <button type="button" class="btn-secondary" onclick="showPage('dashboard')">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- RANKING PAGE -->
        <div id="rankingPage" class="page">
            <div class="section">
                <h2 style="margin-bottom: 30px;">🏆 Ranking de Alunos</h2>
                <div class="ranking-table">
                    <div class="ranking-header">
                        <div>Posição</div>
                        <div>Aluno</div>
                        <div>Treinos</div>
                        <div>Pontos</div>
                        <div>Sequência</div>
                    </div>
                    <div id="rankingList"></div>
                </div>
            </div>
        </div>

        <!-- PROFILE PAGE -->
        <div id="profilePage" class="page">
            <div class="profile-section">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar">👤</div>
                    <div>
                        <h1 id="profileName">Seu Nome</h1>
                        <p id="profileRole">Aluno</p>
                    </div>
                </div>

                <form onsubmit="handleUpdateProfile(event)">
                    <div class="form-container">
                        <div class="form-group">
                            <label>Nome</label>
                            <input type="text" id="profileNameInput" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="profileEmailInput" readonly>
                        </div>
                        <div class="form-group">
                            <label>Telefone</label>
                            <input type="tel" id="profilePhoneInput">
                        </div>
                        <div class="form-group" id="profileGoalDiv" style="display: none;">
                            <label>Objetivo</label>
                            <input type="text" id="profileGoalInput">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Salvar</button>
                        <button type="button" class="btn-secondary" onclick="showPage('dashboard')">Voltar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBK7hpCtjQ6COYOFZw1k2l84tBbjfHqUdI",
        authDomain: "fitness-app-7aa96.firebaseapp.com",
        projectId: "fitness-app-7aa96",
        storageBucket: "fitness-app-7aa96.firebasestorage.app",
        messagingSenderId: "123102660519",
        appId: "1:123102660519:web:b71e04b17fea141e629882"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let userRole = null;
    let userProfile = null;

    auth.onAuthStateChanged(async user => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        currentUser = user;
        await initializeApp();
    });

    async function initializeApp() {
        try {
            const ptDoc = await db.collection('users').doc(currentUser.uid).get();
            if (ptDoc.exists) {
                userRole = 'pt';
                userProfile = ptDoc.data();
            } else {
                const alunosSnap = await db.collection('alunos').where('uid', '==', currentUser.uid).get();
                if (!alunosSnap.empty) {
                    userRole = 'aluno';
                    userProfile = { id: alunosSnap.docs[0].id, ...alunosSnap.docs[0].data() };
                } else {
                    userRole = 'aluno';
                    userProfile = { uid: currentUser.uid, name: currentUser.email };
                }
            }

            setupUI();
            loadDashboard();
        } catch (error) {
            console.error('Erro:', error);
            showToast('❌ Erro ao carregar');
        }
    }

    function setupUI() {
        document.getElementById('userAvatar').textContent = userProfile.name?.charAt(0).toUpperCase() || 'U';

        const nav = document.getElementById('headerNav');
        if (userRole === 'pt') {
            nav.innerHTML = `
                <button class="nav-btn active" onclick="showPage('dashboard')">Dashboard</button>
                <button class="nav-btn" onclick="showPage('ranking')">Ranking</button>
            `;
            document.getElementById('pendingSection').style.display = 'block';
            document.getElementById('studentsSection').style.display = 'block';
        } else {
            nav.innerHTML = `<button class="nav-btn active" onclick="showPage('dashboard')">Home</button>`;
            document.getElementById('gamificationSection').style.display = 'block';
        }
    }

    async function loadDashboard() {
        const title = document.getElementById('dashboardTitle');
        const hora = new Date().getHours();
        const saudacao = hora < 12 ? 'Bom dia' : hora < 18 ? 'Boa tarde' : 'Boa noite';
        title.textContent = `${saudacao}, ${userProfile.name}! 👋`;

        if (userRole === 'pt') {
            await loadPTDashboard();
        } else {
            await loadAlunoDashboard();
        }
    }

    async function loadPTDashboard() {
        const alunosSnap = await db.collection('alunos').where('personalTrainerId', '==', currentUser.uid).get();
        const alunosList = alunosSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        const stats = `
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div>
                    <div class="stat-value">${alunosList.length}</div>
                    <div class="stat-label">Alunos</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏳</div>
                <div>
                    <div class="stat-value" id="pendingCount">0</div>
                    <div class="stat-label">Pendentes</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div>
                    <div class="stat-value">${alunosList.reduce((sum, a) => sum + (a.gamification?.totalPoints || 0), 0)}</div>
                    <div class="stat-label">Pontos</div>
                </div>
            </div>
        `;

        document.getElementById('statsGrid').innerHTML = stats;

        // Carrega alunos pendentes
        const pendingSnap = await db.collection('alunos').where('status', '==', 'pending').get();
        const pendingList = pendingSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        document.getElementById('pendingCount').textContent = pendingList.length;

        if (pendingList.length > 0) {
            document.getElementById('pendingList').innerHTML = pendingList.map(aluno => `
                <div class="pending-card">
                    <div class="pending-header">
                        <div class="pending-name">${aluno.name}</div>
                    </div>
                    <div class="pending-email">${aluno.email}</div>
                    <div class="pending-actions">
                        <button class="btn-approve" onclick="approveStudent('${aluno.id}')">✅ Aprovar</button>
                        <button class="btn-reject" onclick="rejectStudent('${aluno.id}')">❌ Rejeitar</button>
                    </div>
                </div>
            `).join('');
        } else {
            document.getElementById('pendingList').innerHTML = '<div class="empty-state">Nenhum aluno pendente</div>';
        }

        // Carrega alunos aprovados
        const approvedStudents = alunosList.filter(a => a.status === 'approved' || !a.status);
        if (approvedStudents.length > 0) {
            document.getElementById('studentsGrid').innerHTML = approvedStudents.map(aluno => `
                <div class="student-card">
                    <div class="student-header">👤</div>
                    <div class="student-body">
                        <div class="student-name">${aluno.name}</div>
                        <div class="student-goal">${aluno.goal || 'Sem meta'}</div>
                        <div class="student-actions">
                            <button class="btn-primary" style="flex: 1;" onclick="startCreateWorkout('${aluno.id}')">➕ Treino</button>
                        </div>
                    </div>
                </div>
            `).join('');
        } else {
            document.getElementById('studentsGrid').innerHTML = '<div class="empty-state">Nenhum aluno aprovado</div>';
        }
    }

    async function loadAlunoDashboard() {
        const stats = `
            <div class="stat-card">
                <div class="stat-icon">💪</div>
                <div>
                    <div class="stat-value">${userProfile.gamification?.totalWorkouts || 0}</div>
                    <div class="stat-label">Treinos</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div>
                    <div class="stat-value">${userProfile.gamification?.totalPoints || 0}</div>
                    <div class="stat-label">Pontos</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div>
                    <div class="stat-value">${userProfile.gamification?.streak || 0}</div>
                    <div class="stat-label">Sequência</div>
                </div>
            </div>
        `;

        document.getElementById('statsGrid').innerHTML = stats;

        const points = userProfile.gamification?.totalPoints || 0;
        let level = 'Novato';
        if (points >= 500) level = 'Guerreiro';
        if (points >= 1500) level = 'Lendário';
        if (points >= 3000) level = 'Supremo';

        document.getElementById('gamificationContent').innerHTML = `
            <div class="stat-card">
                <div class="stat-icon" style="font-size: 30px;">🎯</div>
                <div>
                    <div class="stat-value" style="font-size: 20px;">${level}</div>
                    <div class="stat-label">Seu Nível</div>
                </div>
            </div>
            <p style="color: #666; margin-top: 16px;">Continue treinando para evoluir!</p>
        `;
    }

    async function approveStudent(alunoId) {
        try {
            await db.collection('alunos').doc(alunoId).update({
                status: 'approved',
                personalTrainerId: currentUser.uid
            });
            showToast('✅ Aluno aprovado!');
            loadDashboard();
        } catch (error) {
            showToast('❌ Erro ao aprovar');
        }
    }

    async function rejectStudent(alunoId) {
        try {
            await db.collection('alunos').doc(alunoId).update({
                status: 'rejected'
            });
            showToast('❌ Aluno rejeitado');
            loadDashboard();
        } catch (error) {
            showToast('❌ Erro ao rejeitar');
        }
    }

    async function handleAddStudent(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;

        try {
            await db.collection('alunos').add({
                personalTrainerId: currentUser.uid,
                name: document.getElementById('studentName').value,
                email: document.getElementById('studentEmail').value,
                phone: document.getElementById('studentPhone').value,
                goal: document.getElementById('studentGoal').value,
                status: 'approved',
                gamification: {
                    points: 0,
                    streak: 0,
                    badges: [],
                    totalWorkouts: 0
                },
                createdAt: new Date()
            });

            showToast('✅ Aluno adicionado!');
            showPage('dashboard');
            loadDashboard();
        } catch (error) {
            showToast('❌ Erro ao adicionar');
        }

        btn.disabled = false;
    }

    async function loadRanking() {
        const alunosSnap = await db.collection('alunos').orderBy('gamification.totalPoints', 'desc').limit(20).get();
        const docs = alunosSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        const ranking = docs.map((doc, index) => `
            <div class="ranking-row">
                <div class="rank-badge">#${index + 1}</div>
                <div>${doc.name}</div>
                <div>${doc.gamification?.totalWorkouts || 0}</div>
                <div>${doc.gamification?.totalPoints || 0}</div>
                <div>🔥 ${doc.gamification?.streak || 0}</div>
            </div>
        `).join('');

        document.getElementById('rankingList').innerHTML = ranking || '<div class="empty-state">Nenhum aluno</div>';
    }

    function handleUpdateProfile(e) {
        e.preventDefault();
        showToast('✅ Perfil atualizado!');
    }

    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
        document.getElementById(page + 'Page').classList.add('show');

        if (page === 'ranking') loadRanking();
        if (page === 'profile') loadProfile();
    }

    function loadProfile() {
        document.getElementById('profileName').textContent = userProfile.name || 'Seu Nome';
        document.getElementById('profileRole').textContent = userRole === 'pt' ? 'Personal Trainer' : 'Aluno';
        document.getElementById('profileAvatar').textContent = userProfile.name?.charAt(0).toUpperCase() || 'U';
        document.getElementById('profileNameInput').value = userProfile.name || '';
        document.getElementById('profileEmailInput').value = currentUser.email;
        document.getElementById('profilePhoneInput').value = userProfile.phone || '';

        if (userRole === 'aluno') {
            document.getElementById('profileGoalDiv').style.display = 'block';
            document.getElementById('profileGoalInput').value = userProfile.goal || '';
        }
    }

    function startCreateWorkout(alunoId) {
        window.location.href = `workout.html?alunoId=${alunoId}`;
    }

    function handleLogout() {
        if (confirm('Tem certeza que deseja sair?')) {
            auth.signOut();
            window.location.href = 'index.html';
        }
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
</script>

</body>
</html>
