<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#E07800">
    <meta name="description" content="FITNESS - Transforme seu corpo, alcance seus objetivos">
    <title>💪 FITNESS - Seu Personal Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-orange-900 to-gray-900">

<!-- LANDING PAGE -->
<div id="landingPage" class="min-h-screen flex flex-col justify-center items-center px-4 py-8">
    <div class="text-center max-w-2xl">
        <!-- Logo -->
        <div class="text-8xl mb-4 animate-bounce">💪</div>
        
        <!-- Title -->
        <h1 class="text-6xl font-black text-white mb-4 drop-shadow-lg">
            FITNESS
        </h1>
        
        <!-- Subtitle -->
        <p class="text-xl text-gray-200 mb-8 font-light">
            Transforme Seu Corpo, Alcance Seus Objetivos
        </p>
        
        <!-- Features Grid -->
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-12">
            <div class="bg-white/10 backdrop-blur-md rounded-lg p-4 border border-white/20">
                <div class="text-3xl mb-2">🎯</div>
                <div class="text-xs text-gray-300 font-semibold">Treinos Personalizados</div>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-lg p-4 border border-white/20">
                <div class="text-3xl mb-2">📊</div>
                <div class="text-xs text-gray-300 font-semibold">Progresso em Tempo Real</div>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-lg p-4 border border-white/20">
                <div class="text-3xl mb-2">🏆</div>
                <div class="text-xs text-gray-300 font-semibold">Gamificação & Ranking</div>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-lg p-4 border border-white/20">
                <div class="text-3xl mb-2">💬</div>
                <div class="text-xs text-gray-300 font-semibold">Chat com Personal</div>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-lg p-4 border border-white/20">
                <div class="text-3xl mb-2">🍎</div>
                <div class="text-xs text-gray-300 font-semibold">Prescrição de Dieta</div>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-lg p-4 border border-white/20">
                <div class="text-3xl mb-2">📈</div>
                <div class="text-xs text-gray-300 font-semibold">Acompanhamento Total</div>
            </div>
        </div>

        <!-- CTA Buttons -->
        <div class="flex flex-col md:flex-row gap-4 justify-center">
            <button onclick="openAuth('login')" 
                class="px-8 py-4 bg-white text-orange-600 font-bold rounded-lg hover:scale-105 transition shadow-xl">
                Entrar
            </button>
            <button onclick="openAuth('signup')" 
                class="px-8 py-4 bg-orange-600 text-white font-bold rounded-lg border-2 border-white hover:bg-orange-700 transition">
                Criar Conta
            </button>
        </div>

        <!-- Footer -->
        <div class="mt-12 text-gray-400 text-sm">
            <p>Demo: <strong>trainer@test.com</strong> / 123456 (PT)</p>
            <p><strong>aluno@test.com</strong> / 123456 (Aluno)</p>
        </div>
    </div>
</div>

<!-- AUTH MODAL -->
<div id="authModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-96 overflow-y-auto">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-orange-600 to-orange-500 text-white p-8 relative">
            <button onclick="closeAuth()" class="absolute top-4 right-4 text-2xl hover:scale-110">✕</button>
            <h2 class="text-4xl font-black">💪 FITNESS</h2>
        </div>

        <!-- Tabs -->
        <div class="flex border-b">
            <button onclick="switchTab('login')" class="tab-btn flex-1 py-4 text-center font-bold border-b-4 border-orange-600 text-orange-600" data-tab="login">
                Login
            </button>
            <button onclick="switchTab('signup')" class="tab-btn flex-1 py-4 text-center font-bold text-gray-400" data-tab="signup">
                Cadastro
            </button>
        </div>

        <!-- Forms -->
        <div class="p-8">
            <!-- LOGIN FORM -->
            <form id="loginForm" class="hidden" onsubmit="handleLogin(event)">
                <div id="loginError" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-3 mb-4 rounded">
                    <span id="loginErrorMsg"></span>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 font-bold text-sm mb-2">Email</label>
                    <input type="email" id="loginEmail" placeholder="seu@email.com" required
                        class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-orange-500 focus:outline-none">
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 font-bold text-sm mb-2">Senha</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required
                        class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-orange-500 focus:outline-none">
                </div>

                <button type="submit" id="loginBtn" 
                    class="w-full bg-gradient-to-r from-orange-600 to-orange-500 text-white font-bold py-3 rounded-lg hover:scale-105 transition">
                    Entrar
                </button>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signupForm" class="hidden" onsubmit="handleSignup(event)">
                <div id="signupError" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-3 mb-4 rounded">
                    <span id="signupErrorMsg"></span>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 font-bold text-sm mb-2">Nome Completo</label>
                    <input type="text" id="signupName" placeholder="Seu Nome" required
                        class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-orange-500 focus:outline-none">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 font-bold text-sm mb-2">Email</label>
                    <input type="email" id="signupEmail" placeholder="seu@email.com" required
                        class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-orange-500 focus:outline-none">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 font-bold text-sm mb-2">Senha</label>
                    <input type="password" id="signupPassword" placeholder="••••••••" required minlength="6"
                        class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-orange-500 focus:outline-none">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 font-bold text-sm mb-2">Telefone</label>
                    <input type="tel" id="signupPhone" placeholder="(11) 99999-9999"
                        class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-orange-500 focus:outline-none">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 font-bold text-sm mb-2">Tipo de Conta</label>
                    <select id="signupRole" required onchange="togglePTCode()"
                        class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-orange-500 focus:outline-none">
                        <option value="">Selecione...</option>
                        <option value="aluno">Aluno</option>
                        <option value="pt">Personal Trainer</option>
                    </select>
                </div>

                <div id="ptCodeDiv" class="hidden mb-4">
                    <label class="block text-gray-700 font-bold text-sm mb-2">Código PT</label>
                    <input type="password" id="ptCode" placeholder="Código de acesso"
                        class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-orange-500 focus:outline-none">
                </div>

                <button type="submit" id="signupBtn" 
                    class="w-full bg-gradient-to-r from-orange-600 to-orange-500 text-white font-bold py-3 rounded-lg hover:scale-105 transition">
                    Cadastrar
                </button>
            </form>
        </div>
    </div>
</div>

<!-- LOADING -->
<div id="loadingScreen" class="hidden fixed inset-0 bg-black flex items-center justify-center z-50">
    <div class="text-center">
        <div class="text-6xl mb-4 animate-spin">⚙️</div>
        <p class="text-white text-lg">Carregando...</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBK7hpCtjQ6COYOFZw1k2l84tBbjfHqUdI",
        authDomain: "fitness-app-7aa96.firebaseapp.com",
        projectId: "fitness-app-7aa96",
        storageBucket: "fitness-app-7aa96.firebasestorage.app",
        messagingSenderId: "123102660519",
        appId: "1:123102660519:web:b71e04b17fea141e629882"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Check if user is logged in
    auth.onAuthStateChanged(user => {
        console.log('✅ Auth state changed:', user ? user.email : 'No user');
        if (user) {
            console.log('🚀 Redirecting to app...');
            window.location.href = 'app.html';
        }
    });

    function openAuth(tab) {
        document.getElementById('authModal').classList.remove('hidden');
        switchTab(tab);
    }

    function closeAuth() {
        document.getElementById('authModal').classList.add('hidden');
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('border-b-4', btn.dataset.tab === tab);
            btn.classList.toggle('border-orange-600', btn.dataset.tab === tab);
            btn.classList.toggle('text-orange-600', btn.dataset.tab === tab);
            btn.classList.toggle('text-gray-400', btn.dataset.tab !== tab);
        });

        document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
        document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
    }

    function togglePTCode() {
        const role = document.getElementById('signupRole').value;
        document.getElementById('ptCodeDiv').classList.toggle('hidden', role !== 'pt');
    }

    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('loginError');

        console.log('🔐 Attempting login:', email);
        btn.disabled = true;
        btn.textContent = 'Entrando...';
        errorDiv.classList.add('hidden');

        try {
            const result = await auth.signInWithEmailAndPassword(email, password);
            console.log('✅ Login successful:', result.user.email);
            
            // Show loading screen while redirecting
            document.getElementById('loadingScreen').classList.remove('hidden');
            
        } catch (error) {
            console.error('❌ Login error:', error.code, error.message);
            let errorMsg = 'Erro ao fazer login';
            
            if (error.code === 'auth/user-not-found') {
                errorMsg = 'Email não encontrado';
            } else if (error.code === 'auth/wrong-password') {
                errorMsg = 'Senha incorreta';
            } else if (error.code === 'auth/invalid-email') {
                errorMsg = 'Email inválido';
            }
            
            document.getElementById('loginErrorMsg').textContent = errorMsg;
            errorDiv.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    }

    async function handleSignup(e) {
        e.preventDefault();
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const phone = document.getElementById('signupPhone').value.trim();
        const role = document.getElementById('signupRole').value;
        const ptCode = document.getElementById('ptCode').value;
        const btn = document.getElementById('signupBtn');
        const errorDiv = document.getElementById('signupError');

        // Validation
        if (!name || !email || !password || !role) {
            document.getElementById('signupErrorMsg').textContent = 'Preencha todos os campos obrigatórios';
            errorDiv.classList.remove('hidden');
            return;
        }

        if (password.length < 6) {
            document.getElementById('signupErrorMsg').textContent = 'Senha deve ter no mínimo 6 caracteres';
            errorDiv.classList.remove('hidden');
            return;
        }

        if (role === 'pt' && ptCode !== 'TRAINER2024') {
            document.getElementById('signupErrorMsg').textContent = 'Código de Personal Trainer inválido';
            errorDiv.classList.remove('hidden');
            return;
        }

        console.log('📝 Attempting signup:', email, 'as', role);
        btn.disabled = true;
        btn.textContent = 'Criando conta...';
        errorDiv.classList.add('hidden');

        try {
            // Create auth user
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const uid = userCredential.user.uid;
            console.log('✅ User created:', uid);

            // Create user document in Firestore
            if (role === 'pt') {
                console.log('📝 Creating PT profile...');
                await db.collection('users').doc(uid).set({
                    uid,
                    type: 'pt',
                    name,
                    email,
                    phone,
                    bio: '',
                    profilePhoto: '',
                    createdAt: new Date(),
                    updatedAt: new Date()
                });
            } else {
                console.log('📝 Creating Aluno profile...');
                await db.collection('users').doc(uid).set({
                    uid,
                    type: 'aluno',
                    name,
                    email,
                    phone,
                    personalTrainerId: '',
                    goal: '',
                    dateOfBirth: '',
                    gender: '',
                    measurements: {
                        height: 0,
                        weight: 0,
                        chest: 0,
                        waist: 0,
                        hips: 0,
                        arm: 0,
                        leg: 0
                    },
                    profilePhoto: '',
                    gamification: {
                        points: 0,
                        streak: 0,
                        badges: [],
                        totalWorkouts: 0,
                        totalPoints: 0,
                        level: 'Novato'
                    },
                    status: 'pending',
                    createdAt: new Date(),
                    updatedAt: new Date()
                });
            }

            console.log('✅ Profile created successfully');
            showToast('✅ Conta criada com sucesso!');
            
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.remove('hidden');
            }, 1000);

        } catch (error) {
            console.error('❌ Signup error:', error.code, error.message);
            let errorMsg = 'Erro ao criar conta';
            
            if (error.code === 'auth/email-already-in-use') {
                errorMsg = 'Este email já está cadastrado';
            } else if (error.code === 'auth/weak-password') {
                errorMsg = 'Senha muito fraca';
            } else if (error.code === 'auth/invalid-email') {
                errorMsg = 'Email inválido';
            }
            
            document.getElementById('signupErrorMsg').textContent = errorMsg;
            errorDiv.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Cadastrar';
        }
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-4 right-4 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg z-50 animate-bounce';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Close modal when clicking outside
    document.getElementById('authModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('authModal')) {
            closeAuth();
        }
    });
</script>

</body>
</html>
