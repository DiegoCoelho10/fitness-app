<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#E07800">
    <title>💪 FITNESS - Personal Trainer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        /* LANDING PAGE */
        .landing {
            background: linear-gradient(135deg, rgba(224, 120, 0, 0.7) 0%, rgba(255, 153, 0, 0.7) 100%),
                        url('https://i.imgur.com/PZM2tJg.jpg') center/cover fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .landing-logo {
            font-size: 100px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        .landing-title {
            font-size: 52px;
            font-weight: 700;
            margin-bottom: 12px;
            text-shadow: 0 3px 15px rgba(0,0,0,0.4);
        }

        .landing-subtitle {
            font-size: 22px;
            margin-bottom: 50px;
            opacity: 0.95;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .landing-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
            max-width: 900px;
        }

        .feature {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .feature-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .feature-text {
            font-size: 13px;
            font-weight: 600;
        }

        .cta-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 40px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: white;
            color: #E07800;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background: white;
            color: #E07800;
        }

        /* AUTH MODAL */
        .auth-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-overlay.show {
            display: flex;
        }

        .auth-box {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        .auth-header h2 {
            font-size: 36px;
            margin-bottom: 5px;
        }

        .close-auth {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .close-auth:hover {
            background: rgba(255,255,255,0.4);
        }

        .auth-tabs {
            display: flex;
            border-bottom: 2px solid #eee;
        }

        .tab {
            flex: 1;
            padding: 16px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }

        .tab.active {
            color: #E07800;
            border-bottom-color: #E07800;
        }

        .auth-form {
            padding: 30px;
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #E07800;
            box-shadow: 0 0 0 3px rgba(224,120,0,0.1);
            background: #fffaf0;
        }

        .error {
            background: #ffebee;
            color: #d32f2f;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            border-left: 4px solid #d32f2f;
            display: none;
        }

        .error.show {
            display: block;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224,120,0,0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
        }

        .auth-footer {
            background: #fffaf0;
            border-top: 1px solid #FFE0C0;
            padding: 16px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            z-index: 2000;
            animation: slideInRight 0.3s;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .landing-title {
                font-size: 36px;
            }

            .landing-logo {
                font-size: 70px;
            }

            .landing-features {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .cta-buttons {
                gap: 10px;
            }

            .btn {
                padding: 12px 24px;
                font-size: 14px;
            }

            .auth-box {
                max-width: 100%;
            }

            .auth-header h2 {
                font-size: 28px;
            }
        }

        @media (max-width: 480px) {
            .landing-title {
                font-size: 28px;
            }

            .landing-logo {
                font-size: 50px;
            }

            .landing-subtitle {
                font-size: 16px;
            }

            .landing-features {
                grid-template-columns: 1fr;
            }

            .cta-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .feature-text {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<!-- LANDING PAGE -->
<div class="landing">
    <div class="landing-logo">💪</div>
    <h1 class="landing-title">FITNESS</h1>
    <p class="landing-subtitle">Transforme Seu Corpo, Alcance Seus Objetivos</p>

    <div class="landing-features">
        <div class="feature">
            <div class="feature-icon">🎯</div>
            <div class="feature-text">Treinos Personalizados</div>
        </div>
        <div class="feature">
            <div class="feature-icon">📊</div>
            <div class="feature-text">Progresso em Tempo Real</div>
        </div>
        <div class="feature">
            <div class="feature-icon">🏆</div>
            <div class="feature-text">Gamificação & Ranking</div>
        </div>
        <div class="feature">
            <div class="feature-icon">💬</div>
            <div class="feature-text">Chat com Personal</div>
        </div>
        <div class="feature">
            <div class="feature-icon">🍎</div>
            <div class="feature-text">Prescrição de Dieta</div>
        </div>
        <div class="feature">
            <div class="feature-icon">📈</div>
            <div class="feature-text">Acompanhamento Completo</div>
        </div>
    </div>

    <div class="cta-buttons">
        <button class="btn btn-primary" onclick="openAuth('login')">Entrar</button>
        <button class="btn btn-secondary" onclick="openAuth('signup')">Criar Conta</button>
    </div>
</div>

<!-- AUTH MODAL -->
<div id="authOverlay" class="auth-overlay">
    <div class="auth-box">
        <div class="auth-header">
            <button class="close-auth" onclick="closeAuth()">✕</button>
            <h2>💪 FITNESS</h2>
        </div>

        <div class="auth-tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('signup')">Cadastro</button>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
            <div class="error" id="loginError"></div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit" id="loginBtn">Entrar</button>
        </form>

        <!-- SIGNUP FORM -->
        <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
            <div class="error" id="signupError"></div>
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="signupName" placeholder="Seu Nome" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="signupPassword" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Telefone</label>
                <input type="tel" id="signupPhone" placeholder="(11) 99999-9999">
            </div>
            <div class="form-group">
                <label>Tipo de Conta</label>
                <select id="signupRole" onchange="togglePTCode()" required>
                    <option value="">Selecione...</option>
                    <option value="aluno">Aluno</option>
                    <option value="pt">Personal Trainer</option>
                </select>
            </div>
            <div class="form-group" id="ptCodeDiv" style="display: none;">
                <label>Código de Personal Trainer</label>
                <input type="password" id="ptCode" placeholder="Código de acesso">
            </div>
            <button type="submit" class="btn-submit" id="signupBtn">Cadastrar</button>
        </form>

        <div class="auth-footer">
            💡 <strong>Demo:</strong> trainer@test.com / 123456 (PT) | aluno@test.com / 123456 (Aluno)
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBK7hpCtjQ6COYOFZw1k2l84tBbjfHqUdI",
        authDomain: "fitness-app-7aa96.firebaseapp.com",
        projectId: "fitness-app-7aa96",
        storageBucket: "fitness-app-7aa96.firebasestorage.app",
        messagingSenderId: "123102660519",
        appId: "1:123102660519:web:b71e04b17fea141e629882"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Check if user is logged in
    auth.onAuthStateChanged(user => {
        if (user) {
            window.location.href = 'app.html';
        }
    });

    function openAuth(tab) {
        document.getElementById('authOverlay').classList.add('show');
        switchTab(tab);
    }

    function closeAuth() {
        document.getElementById('authOverlay').classList.remove('show');
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));

        if (tab === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('loginForm').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('signupForm').classList.add('active');
        }
    }

    function togglePTCode() {
        const role = document.getElementById('signupRole').value;
        document.getElementById('ptCodeDiv').style.display = role === 'pt' ? 'block' : 'none';
    }

    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('loginError');

        btn.disabled = true;
        btn.textContent = 'Entrando...';
        errorDiv.classList.remove('show');

        try {
            await auth.signInWithEmailAndPassword(email, password);
            window.location.href = 'app.html';
        } catch (error) {
            errorDiv.textContent = '❌ Email ou senha incorretos';
            errorDiv.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    }

    async function handleSignup(e) {
        e.preventDefault();
        const name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const phone = document.getElementById('signupPhone').value;
        const role = document.getElementById('signupRole').value;
        const ptCode = document.getElementById('ptCode').value;
        const btn = document.getElementById('signupBtn');
        const errorDiv = document.getElementById('signupError');

        if (role === 'pt' && ptCode !== 'TRAINER2024') {
            errorDiv.textContent = '❌ Código de Personal Trainer inválido';
            errorDiv.classList.add('show');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Criando conta...';
        errorDiv.classList.remove('show');

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const uid = userCredential.user.uid;

            if (role === 'pt') {
                await db.collection('users').doc(uid).set({
                    uid,
                    type: 'pt',
                    name,
                    email,
                    phone,
                    bio: '',
                    specialty: '',
                    profilePhoto: '',
                    createdAt: new Date(),
                    updatedAt: new Date()
                });
            } else {
                await db.collection('alunos').add({
                    uid,
                    type: 'aluno',
                    name,
                    email,
                    phone,
                    personalTrainerId: '',
                    goal: '',
                    dateOfBirth: '',
                    gender: '',
                    measurements: {
                        height: 0,
                        weight: 0,
                        chest: 0,
                        waist: 0,
                        hips: 0,
                        arm: 0,
                        leg: 0
                    },
                    profilePhoto: '',
                    gamification: {
                        points: 0,
                        streak: 0,
                        badges: [],
                        totalWorkouts: 0,
                        totalPoints: 0,
                        level: 'Novato'
                    },
                    status: 'pending',
                    createdAt: new Date(),
                    updatedAt: new Date()
                });
            }

            showToast('✅ Conta criada com sucesso!');
            setTimeout(() => {
                window.location.href = 'app.html';
            }, 1500);
        } catch (error) {
            errorDiv.textContent = '❌ ' + (error.message || 'Erro ao criar conta');
            errorDiv.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Cadastrar';
        }
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Close modal when clicking outside
    document.getElementById('authOverlay').addEventListener('click', (e) => {
        if (e.target === document.getElementById('authOverlay')) {
            closeAuth();
        }
    });
</script>

</body>
</html>
