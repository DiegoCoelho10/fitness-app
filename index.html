<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#E07800">
    <title>💪 FITNESS - Transforme Seu Corpo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f5;
        }

        .landing {
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            justify-content: center;
            align-items: center;
        }

        .landing-content {
            text-align: center;
            max-width: 800px;
        }

        .landing-logo {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .landing-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .landing-subtitle {
            font-size: 20px;
            opacity: 0.95;
            margin-bottom: 40px;
        }

        .landing-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .feature-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .feature-text {
            font-size: 14px;
            font-weight: 600;
        }

        .landing-cta {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-login, .btn-signup {
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login {
            background: white;
            color: #E07800;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .btn-signup {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
        }

        .btn-signup:hover {
            background: white;
            color: #E07800;
        }

        /* MODAL AUTH */
        .auth-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-modal.show {
            display: flex;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            background: #f8f8f8;
        }

        .tab {
            flex: 1;
            padding: 16px;
            background: transparent;
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }

        .tab.active {
            color: #E07800;
            border-bottom-color: #E07800;
            background: white;
        }

        .auth-form {
            padding: 30px;
            display: none;
        }

        .auth-form.show {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #E07800;
            box-shadow: 0 0 0 3px rgba(224, 120, 0, 0.1);
            background: #fffaf0;
        }

        .error-message {
            background: #ffebee;
            color: #d32f2f;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            border-left: 4px solid #d32f2f;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #E07800 0%, #FF9900 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-auth:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224, 120, 0, 0.3);
        }

        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-demo {
            background: #fffaf0;
            border-top: 1px solid #FFE0C0;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }

        .btn-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        @media (max-width: 768px) {
            .landing-title {
                font-size: 32px;
            }

            .landing-logo {
                font-size: 60px;
            }

            .landing-features {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .auth-card {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .landing-title {
                font-size: 26px;
            }

            .landing-subtitle {
                font-size: 16px;
            }

            .landing-features {
                grid-template-columns: 1fr;
            }

            .btn-login, .btn-signup {
                padding: 12px 24px;
                font-size: 14px;
            }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            z-index: 2000;
        }
    </style>
</head>
<body>

<div class="landing">
    <div class="landing-content">
        <div class="landing-logo">💪</div>
        <h1 class="landing-title">FITNESS</h1>
        <p class="landing-subtitle">Transforme Seu Corpo, Alcance Seus Objetivos</p>

        <div class="landing-features">
            <div class="feature-card">
                <div class="feature-icon">🎯</div>
                <div class="feature-text">Treinos Personalizados</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📊</div>
                <div class="feature-text">Progresso em Tempo Real</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🏆</div>
                <div class="feature-text">Ranking & Gamificação</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">💬</div>
                <div class="feature-text">Chat com PT</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📱</div>
                <div class="feature-text">Funciona Offline</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🔥</div>
                <div class="feature-text">Streaks & Badges</div>
            </div>
        </div>

        <div class="landing-cta">
            <button class="btn-login" onclick="showAuth('login')">Entrar</button>
            <button class="btn-signup" onclick="showAuth('signup')">Criar Conta</button>
        </div>
    </div>
</div>

<!-- AUTH MODAL -->
<div id="authModal" class="auth-modal">
    <button class="btn-close" onclick="closeAuth()">✕</button>
    
    <div class="auth-card">
        <div class="auth-header">
            <h1>💪 FITNESS</h1>
        </div>

        <div class="auth-tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('signup')">Cadastro</button>
        </div>

        <!-- LOGIN -->
        <form id="loginForm" class="auth-form show" onsubmit="handleLogin(event)">
            <div class="error-message" id="loginError"></div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth" id="loginBtn">Entrar</button>
        </form>

        <!-- SIGNUP -->
        <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
            <div class="error-message" id="signupError"></div>
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="signupName" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="signupPassword" required>
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select id="signupRole" onchange="toggleCode()">
                    <option value="aluno">Aluno</option>
                    <option value="pt">Personal Trainer</option>
                </select>
            </div>
            <div class="form-group" id="codeDiv" style="display:none;">
                <label>Código PT</label>
                <input type="password" id="trainerCode" placeholder="Código de acesso">
            </div>
            <button type="submit" class="btn-auth" id="signupBtn">Cadastrar</button>
        </form>

        <div class="auth-demo">
            💡 <strong>Demo:</strong> trainer@test.com / 123456 (PT) ou aluno@test.com / 123456
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBK7hpCtjQ6COYOFZw1k2l84tBbjfHqUdI",
        authDomain: "fitness-app-7aa96.firebaseapp.com",
        projectId: "fitness-app-7aa96",
        storageBucket: "fitness-app-7aa96.firebasestorage.app",
        messagingSenderId: "123102660519",
        appId: "1:123102660519:web:b71e04b17fea141e629882"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(user => {
        if (user) {
            window.location.href = 'app.html';
        }
    });

    function showAuth(tab) {
        document.getElementById('authModal').classList.add('show');
        switchTab(tab);
    }

    function closeAuth() {
        document.getElementById('authModal').classList.remove('show');
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('show'));
        
        if (tab === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('loginForm').classList.add('show');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('signupForm').classList.add('show');
        }
    }

    function toggleCode() {
        const role = document.getElementById('signupRole').value;
        document.getElementById('codeDiv').style.display = role === 'pt' ? 'block' : 'none';
    }

    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('loginError');

        btn.disabled = true;
        btn.textContent = 'Entrando...';

        try {
            await auth.signInWithEmailAndPassword(email, password);
            window.location.href = 'app.html';
        } catch (error) {
            errorDiv.textContent = '❌ ' + getErrorMessage(error.code);
            errorDiv.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    }

    async function handleSignup(e) {
        e.preventDefault();
        const name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const role = document.getElementById('signupRole').value;
        const code = document.getElementById('trainerCode').value;
        const btn = document.getElementById('signupBtn');
        const errorDiv = document.getElementById('signupError');

        if (role === 'pt' && code !== 'TRAINER2024') {
            errorDiv.textContent = '❌ Código inválido';
            errorDiv.classList.add('show');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Criando...';

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const uid = userCredential.user.uid;

            if (role === 'pt') {
                await db.collection('users').doc(uid).set({
                    uid,
                    type: 'pt',
                    name,
                    email,
                    createdAt: new Date()
                });
            } else {
                await db.collection('alunos').add({
                    uid,
                    type: 'aluno',
                    name,
                    email,
                    gamification: {
                        points: 0,
                        streak: 0,
                        badges: [],
                        totalWorkouts: 0
                    },
                    createdAt: new Date()
                });
            }

            window.location.href = 'app.html';
        } catch (error) {
            errorDiv.textContent = '❌ ' + getErrorMessage(error.code);
            errorDiv.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Cadastrar';
        }
    }

    function getErrorMessage(code) {
        const messages = {
            'auth/email-already-in-use': 'Email já cadastrado',
            'auth/weak-password': 'Senha muito fraca',
            'auth/invalid-email': 'Email inválido',
            'auth/user-not-found': 'Usuário não encontrado',
            'auth/wrong-password': 'Senha incorreta'
        };
        return messages[code] || 'Erro ao autenticar';
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
</script>

</body>
</html>
